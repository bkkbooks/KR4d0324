body:
  text: 篔忩集卷一宋陳耆卿撰論上顔子論學貴實心貴虛不虛則不實矣是故學者必有所不受而後可以大受鑑之明也惟其不受塵也惟其不受塵故能受物之照不然則既染於物若之何受物哉學者之從聖人亦欲受斯道也遊處并合非道不親請問辨説非道不陳探玩修為非道不思不行夫豈不欲受斯道而卒又莫之受何也其中先有所受故也夫子道之至也顔子受道之至者也夫子曰吾與回言終日不違如愚又曰於吾言無所不悅是顔子能受道矣夫諸子之在聖門其問聖人者比肩其受教於聖人者比肩非不簡易明白也而或疑或辨或愠或譏故雖以聖人加意甄陶畢力鼓鑄猶有未喻者焉顔子獨何為而終日不違又何為而無所不悅耶此非顔子之自異於諸子也諸子之心不虛而顔子之心虛也夫心本至虛而有欲則不虛顔子之虛本於克克則無欲無欲則虛虛則見天故夫子以天授顔子以天受形神交映骨脈俱融宜其終日不違而無所不悅也諸子非不欲悅也不能也顔子非有心於悅也不期悅而自悅也夫豈必言而後悅未言之前固已悅矣未言悅其道既言悅其言故顔子之於聖人可以言而亦可以無言也夫其所以至此者皆自其心之虛者得之不虛則方寸之內皆私欲也吾困於私欲不暇而何暇於道嗟夫私欲之難去久矣非必貨財聲色而後為私也以善視之以善為之而不能不倚於偏亦私而已矣故為惡之私易見而為善之私難知孔門之中不以窮逹纍志者罕矣由求之徒既不能不用賢如閔子則又以不用為髙惟顔子不然用則行而舍則藏焉耳夫必於行者私也必於藏者亦私也顔子之心無私故不必於行而亦不必於藏惟其不必於行而亦不必於藏其藏也非隘其行也非肆此顔子所以幾於夫子而閔子所以不若顔子也夫其斂形抱影於陋巷之間自樂疑若無此世矣為邦之問何勤如焉然則陋巷之間未嘗無髙宫廣厦也此顔子之所以幾於天也天下之以陋巷觀顔子者多矣不以陋巷觀顔子者顔子之徒也曽子論悟道者以真見體道者以真力力之至而見不與之俱是有四肢而無目也見之至而力為之憊是有目而無四肢也雖然人以目為見而不能見乎目之所不見人以四肢為力而不能力乎四肢之所不力夫是以必貴於真見而且貴於真力也夫真力養於百年者也真見發於一朝者也豈惟一朝雖一噓吸之間可也豈惟百年雖與天地相終始可也世人知悟道之難而不知體道之不易以其所謂得於一噓吸者為妙而於天地相終始之説則悶悶焉夫是以崇見而黜力力之不勝而見亦錮矣忠恕者曽子之真見也𢎞毅者曽子之真力也夫曽子以一唯而代萬夫之賸説則其見亦卓矣何懼乎學之不竟而徒致其力哉吁此曽子之所以為善學而獨得乎聖人之髓者也曽子嘗曰尊其所聞則髙明矣行其所知則光大矣忠恕者曽子之所知而𢎞毅者所以行之也𢎞毅之不足力之不至則雖以曽子能無憂乎故曰仁以為己任死而後已死而後已者不死則不已也非所謂與天地相終始者歟蓋天下之大而難致者莫如仁而其近且易入者莫如孝曽子以孝行仁者也所謂本立而道生者也於是求之可以為近矣而猶曰逺焉猶曰死而後已焉則學之不如曽子者其可以己乎見之未及乎曽子者其可以己乎嗚呼使簀而未易吾知其猶未已矣使手足而未啓吾知其猶未已矣簀已易矣手足已啓矣從而已之無愧也雖然曽子可已也曽子之道不可以己也後曽子者能為曽子之孝則曽子常在目矣能為曽子之𢎞毅則曽子亦常在目矣聖門諸子之末流皆未免有弊而惟曽子獨無弊得不以真見真力也哉或曰以曽子之力較之顔子則何如曰既竭吾才則顔子亦嘗用力矣然顔子之力施之未有見之初曽子之力則持之既有見之後也是故未見卓爾則顔子之力可施既見卓爾則顔子之力不可施非不可施也施之之至而將造於不施之地也若曽子則無時而不施矣其所以然則以見之未及顔子故也此所以操之執之期於死而無斁歟曽子始終用力者也顔子始用力者也孔子不假力者也學者未能如孔則學顔可也未能如顔則學曽可也朋黨論昔讀魯論至君子小人和同周比之際未嘗不太息也和近於同然和有安輯之意焉同則迎合而已爾周近於比然周有普遍之意焉比則阿黨而已爾果若是易有比有同人何也曰聖人非惡於同與比也惡其茍也夫均為同與比而所以為同與比者不齊焉是故同于門則無咎同于郊則無悔而同于宗則吝比自內則正吉外比之亦正吉而比之無首則凶然則同與比未可盡黜也世或因魯論之語而盡黜之繫易非孔子乎昔九官相遜而至於四嶽薦鯀則弗成三千臣惟一心而至於周公與召公則不悅天下不以四嶽為同且比亦不以召公為不能同且比夫以嶽比鯀誠不可也以召公比周公何不可者而莫之比何也至後世而朋黨之事起小則亡身而甚則亡其國其所謂同與比者非復雜乎大易之所許而已純乎魯論之所嫉矣無望其為周公召公而視四嶽之與鯀又大有徑庭矣吾不知曰同曰比曰朋黨是三者其果異邪抑名異而實相近邪由後世觀之朋黨非矣而前輩又曰小人無朋惟君子則有之但當去小人之偽朋用君子之真朋此又何也日者抗疏之臣憫士大夫心術議論之偏而預為吾國之慮亟聞宸扆求風厲一新之且曰仇隙既開將成黨與至哉斯言蓋欲折木於萌芽而障隄於涓滴也然吾有疑焉所惡於黨與者謂其各務立異以求勝也然事難茍異亦難茍同今將絶其立異之私則必流為茍同之習異則一是一非猶有擇焉同則無是無非愈難執焉夫至理如圓鏡其不明者有以翳之也去其翳則明矣然則所以為至理之翳者非私乎但絶其私而毋較其異同庶幾與古聖賢之言合矣張耳陳餘論君子重信義而輕利害利害非可輕也蓋以信義為重則必以利害為輕事君處友同此道耳耳餘之起首從陳王既從陳王則終其身可也未幾怨其不大用已遂導武臣以自王於趙則耳為丞相餘為大將軍矣自是而後甘心於趙王可也邯鄲之變借曰無所措手亦何愛一死不以致臣節於王哉乃以一時之計僥幸免禍復相趙歇其相趙歇猶夫武臣也猶夫陳勝也利之所在雖一日而十易其主不以為怪豈但三乎觀二人初相結時號刎頸交自巨鹿之後則若與之不共戴天矣趙王餘之君也耳餘之同列也巨鹿之圍燕齊楚之救兵至焉餘獨髙卧而不恤可乎借使力弱而死於兵亦當然者士君子之行事固不計成敗也此隙一開更相仇惡餘一解印綬耳遂從而收之耳一為常山王餘遂結田榮以襲之餘一為代王耳遂輔漢以擊死之大抵一迫於利害無所不至疇昔刎頸之言能復記否韓退之志柳子厚墓云夫平居里巷相慕悅酒食遊戲相徵逐詡詡強笑語以相取下握手出肺肝相視指天日涕泣誓生死不忍背負真若可信一但臨小利害僅如毛髮許反眼若不相識反擠之又下石焉者皆是也吁其耳餘之謂歟雖然泜水之斬耳誠薄義究其源流則亦餘有以先之二子又不為無辨韓信論鷙鳥百不如一鶚髙帝諸將固多其所與取天下者實一韓信耳大才不可小使漢之連敖都尉與楚之郎中相去幾何哉此蕭何之薦韓信非大將不止而信之見用於漢非大將不就也大凡料事在識處事在謀信之識見於登壇與帝答問之時而其謀見於請兵三萬人之日夫信嘗事羽事羽非不欲佐羽也顧羽非可佐者耳其言匹夫勇婦人仁怙威背約等事及髙帝所以寬仁得人心之大略真如老吏鞫囚彼曲此直較然如日不待垓下之戰而勝負已判矣此信之所以捨楚歸漢也從信之策定三秦矣自髙帝彭城置酒之驕而其事幾敗蓋是時欣翳已降楚而齊趙魏亦皆與楚和矣非信發兵與帝破楚京索而以身下諸國亦曰殆哉夫滎陽京索乃漢與羽相持之地而諸國之下專藉信力前輩謂韓信將兵惜不與項羽一戰不知信以不戰戰羽而帝以不用用信夫欲拔大木不先去其枝葉則根本亦未易搖楚者根本諸國者枝葉也故信專為帝一意下諸國以孤羽之援而帝獨與羽相持於滎陽成臯以扼羽之衝然後羽可圖蓋非信無以下諸國有信而不使之下諸國帝雖與羽相持其氣索矣是信之所以有功於帝者正在於不與羽戰見得有區畫處未可以為疑也然按史記帝紀垓下之戰信未嘗不與其云淮隂侯將三十萬皇帝在後淮隂先合不利却孔將軍費將軍縱楚兵不利淮隂侯復乘之大敗垓下則信之在戰明矣其所以在戰不利者非必誠不利也信之兵用竒疑兵下魏拔幟下趙水囊下齊之類是也其所謂不利者安知其不陽敗隂誘而因以權破之哉是信未嘗不與羽戰也夫前此不與之戰而今與之戰何也曰已下諸國也諸國未下則一力於諸國而未暇及楚諸國既下則可以併力於楚矣要皆有深意也雖然信之智能謀天下而不能謀身又何歟帝之取天下雖不可一日無信亦不能一日不疑信惟其不可一日無故不能一日不疑也人謂帝之疑信始於齊王之封而終於固陵之會以豫觀之奚特此時哉自其請兵三萬籌策了了帝見其處天下事若几上肉心雖喜之亦甚畏之矣一下魏代即收其精兵詣滎陽惟恐其兵之多此一疑也下趙燕則晨自稱漢使即其卧奪之印符惟恐其權之固耳此二疑也至於請為假王而繼以真王之命則其疑遂成至於固陵不會則其疑遂深前二事帝猶能制信後二事則帝不能制信而反為信所制封齊割地之時帝之心已勃勃乎不可遏矣特勢未可耳故項羽一死即奪齊而與之楚變告一上即奪楚而侯之淮隂蓋將以奔走之馳逐之使不得一日無事以嬉當是時帝既疑信而信亦不堪其困雖欲不反不可得也雖欲不誅亦不可得也嗚呼信不反帝於羣雄角逐之時而反帝於天下既定之日壯闢蒯通老從陳豨固可罪亦可哀矣向使帝也稍録舊恩略鋤新忿推誠而復王之未至有末年無聊之舉也蓋惟疑之甚故去之亟信不去帝不得髙枕而卧嘻其甚哉
