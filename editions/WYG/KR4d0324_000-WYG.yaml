  text: 欽定四庫全書集部四
  hash: sha256:feea65c2c5f7b24c3923896ddfefeaca5f2adb12a64602844adb735e91a1782a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0324_WYG_000-1a, image: WYG1178/WYG1178-0001a.png}
body:
  text: 提要篔窻集十巻别集類三宋臣等謹案篔窻集十巻宋陳耆卿撰耆卿有赤城志已著録考呉子良荆溪林下偶談云葉適汲引後進以文字之傳未有所屬晩得耆卿即傾倒付囑之時士論猶未厭適舉東坡太息一篇為證謂他日終當論定其後纔十數年世上文字日益衰落而耆卿卓然為學者所宗又云耆卿四六理趣深而光燄長以文人之筆藻立儒者之典刑合歐蘓王為一家適深歎賞之核以適所作耆卿集序稱許甚至知子良所言為不誣謝鐸赤城新志亦稱其文疆塲甚寛而歩武甚的惟車若水為耆卿弟子所著脚氣集則曰予登篔窻先生門方逾弱冠荆溪呉名輔案名輔即是子良之字先從篔窻已登科相與作為新様古文每一篇出交相諛佞以為文章有格歸呈先祖乃不悦私意謂先祖八十有餘必是老拙曉不得文字顧首顧尾有間有架且造語俊爽皆與老拙不合也既而先祖與篔窻皆即世吾始思六經不如此韓文不如此歐蘓不如此始知其非云云其持論獨異今觀其集雖當南渡後文體衰敗之餘未能盡除積習然其縱横馳驟而一歸之于法度實有灝氣行乎其間非嘽緩之音所可比宜其與適代興矣讀書附志載所著篔窻初集三十巻續集三十八巻宋史藝文志馬端臨經籍考已不著録世亦久無傳本今從永樂大典中採掇薈粹共得文一百三十一篇詩三十八篇詞四篇中如林下偶談所稱代謝希孟上錢相啓㳺中鴻諡議之類均已亡缺蓋所存僅十之一二矣謹釐正訛舛録為十巻俾不終就湮没其葉適呉子良序跋及耆卿自序仍録置前後庻有以攷見其大畧焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀序建安中徐陳應劉爭飾詞藻見稱於時識者謂兩京餘澤由七子尚存自後文體變落雖工愈下雖麗益靡古風不復者幾數百年元祐初黄秦晁張各擅毫墨待價而顯許之者以為古人大文頼數君復見及夫紛紜於紹述埋沒於播遷異等不越宏詞髙第僅止科舉前代遺文風流冺絶又百有餘年矣文之廢興與治消長亦豈細故哉建安元祐恍然再覩蓋未易以常情限也若夫出竒吐穎何地無材近宗歐曾髙揖秦漢未脱摹擬之習徒為陵肆之資所知不深自好已甚欲周目前之用固難矣又安能及逺乎君之於文涉獵既多培蘊亦厚規制廣而宻波瀾浩而平錯綜應㑹緯經勻等膏潤枯筆之後安徐窘步之末若是則薦之廟郊而王度美藏之林藪而幽願愜矣至於審其所從不求强同量其所與毋為易得趨捨一心之信否臧百世之公則何止於建安元祐之文也葉適序續集序文有統緒有氣脈統緒植於正而綿延枝派旁出者無與也氣脈培之厚而盛大華藻外飾者無與也六籍尚矣非直以文稱而言文者輙先焉不曰統緒之端氣脈之元乎自周以降文莫盛於漢唐宋漢之文以賈馬倡接之者更生子雲孟堅其徒也唐之文以韓柳倡接之者習之持正其徒也宋東都之文以歐蘇曾倡接之者旡咎無己文潜其徒也宋南渡之文以吕葉倡接之者夀老其徒也夀老少壯時逺叅洙泗近探伊洛沉涵淵微恢拓廣大固已下視筆墨町畦矣及夫滿而出之則波浩渺而濤起伏麓秀欝而峯崚嶒户管攝而樞運轉輿衛設而冠冕雍容其竒也非怪其麗也非靡其宻也不亂其疎也不㫁其周旋乎賈馬韓桞歐蘇曾之間疆埸甚寛而步武甚的也不幸吕公不及見而葉公晩見之驚詫起立為序其所著論孟紀蒙若干巻篔窻初集若干巻以為學游謝而文晁張也至其獨得於古聖賢者中夜授垂死囑焉而曰吾向以語吕公伯恭今以語夀老四十年矣葉公既沒篔窻之文遂巋然為世宗盖其統緒正而氣脈厚也自元祐後談理者祖程論文者宗蘇而理與文分為二吕公病其然思融㑹之故吕公之文早葩而晚實逮至葉公窮髙極深精妙卓特備天地之竒變而隻字半簡無虛設者夀老一見亦奮躍䇿而追之幾及焉然則所謂統緒正而氣脈厚也又豈直文而已余十六從篔窻二十四從葉公公亦以囑篔窻者囑予也惰不復進毎遐想太息之故於篔窻初集既以鋟之海陵而今復併其續集鋟之豫章使夫統緒氣脈之傳來者尚有考也呉子良序自序予八九歲學屬文十二入鄉校先生長者以其粗工舉業亟進之他未知學也已而杜門銜恤去秋賦逺甚始得肆其力於古今如登崑崙璆琳珩璜爛目萬狀欲與之敵而應答不暇於是知作文之難詩咏性情非有感觸不作他文雖强作亦不多見四六之浮至於家臯䕫而人稷契讀之欲噦予心病焉㑹四五郡侯連以牋翰為囑辭不獲命涉筆無休時今數之不啻千百矣予三十五竊末第人視之未為甚暮然老態先白卧病日十九或謂予技癢役其形而然予思之誠是也獨以疇昔勞瘁不忍付之埃土擇其粗可予懷者録藏之今而後當涵浸乎義理之學詞章之習不惟不敢亦不暇姑志吾過以諗來者嘉定六年寒食節陳耆卿序
