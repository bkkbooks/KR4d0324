body:
  text: 篔窓集巻九宋陳耆卿撰祝文代台州祈年祝文寳厯方新喜兆和於青皥銅符惟舊願徼福於黎元即人日以精祈覬靈穹之昭格伏念臣字民有志報政亡庸凌兢鼠技之窮頂踵鴻私之覆年書大有洊收䆉稏之勲月肇嘉平屢見繽紛之瑞川后欲波而隨止祝融幾煽以旋收積逭吏愆疇非帝力顧彊弩之将末凛深淵而不遑雖飭躬靡間於去來然厚下盍圖於終始遥瞻紫極僣列丹悰伏願淵鍳下臨真心廣佑全家飽暖豈徒私荷於恩慈闔境安寜或者公依於坱圠身雖歸止心曷忘之社稷神祝文縣令八品官爾有社稷焉讀詩至載芟則知祈年古矣祈之春固将報之秋也青陽氲氲千耦如雲神其主之食我農人雷師祝文孰鼓大造隱隱谹谹我陽聿宣抽芽振萌百里之封於焉取則恐懼修省何敢不力嘉牲㫖酒食且飲之嵗大叶和愉愉熙熙風師祝文妙矣一元神橐籥之衆矣萬竅神簫勺之其象維何巽以申之其應維何亶云時之我為我民觴之俎之神其格思永言保之代諸廟祈雨祝文嗟嗟百糓命懸於雨或調其初猶有後慮而况今日穡事方起夫豈旱時驕陽一炬已針之苗如子奪乳待布之秧如老䖏女胚胎未成牙蘖未舉有秋之望今在何許惟神靈長血食茲土豈有民勞神獨容與宜矜宜哀為之宗主駕風鞭霆一洗原膴其子既飽敢忘厥父誓與邦人答神之祜代諸廟祈雨祝文臨海之田髙而埆十日不雨則以旱吿其來舊矣某窮冬假守中春劭農晝餐夜寝惟田之為憂有苗勃興望雨滋灌天嗇厥施農人鶴立其何以占嵗事我用是懼欵謁明神神之廟食於此方憂猶某也其霈甘澤以活此土吏責得寛神祀不匱夫豈獨吾民之賜代諸廟謝雨祝文維五月甲戌某以邦域之旱請命于神神賜之雨苗浡然其興矣迄兹夏季恩嗇不繼吏實恐懼卜以今日再禱祠庭酒肴未共惠澤先霈豈以吏之秕政敢如取攜神實念民故其速有如此者既謝其始復祈其終繼自今時其雨暘毋使吏之名瀆于聽聞代靈康謝雨祝文王以威徳靈異户牖一邦凡祈禱禜禬之事於王必焉嵗将秋矣而屢以旱聞非王尚誰望者涓日泝江蓋将請事環瞻四野忽已滿盈夫神之於民猶父母之於子時厥飲食豈待號呼故某身未及前而神已先接是非偶然之故也然仁以不倦為功事以克終為難神其有以惠顧之常如今日維吏與民不敢忘賜大比靈康祝文神為此方靈祠之冠言神之靈者但曰去菑保嵗而弗思其大者焉夫士短長在已尺度在有司而利達之衆且寡亦足以為神之榮媿神既廟於多士之邦矣而不為多士謀無是理也尚惟左之右之俾人人奮張而不虛其多士之號神之靈於是為大其賢於去菑保嵗也逺矣鎮安祝文嵗大比諸生奉酒醴告于廟祀曰乞靈也夫人保於城城依於神故雖境内毫髮之務惟神之為聴况於賔興多士事大體重者哉夫田可力耕而嵗之豐儉不能自必必之者神爾願言隂相俾獲見功名之秋庶幾不負菑畬且償厥志敢不夙夜思所以答神之賜代澤民廟生日祝文惟王之德郛郭千里惟王之食牲牢千祀百爾祈禬如皷應桴神電繞樞来者塞途吏實亡庸随喜歸敬有殽斯馨為民請命自今隂隲不禱而孚永俾有依血食不孤城隍加封祝文神之為靈昭昭也盗賊神驅之水旱疾疫神夷之影響十同牲幣旁午亦已屢聞于朝而班公侯之貴矣今王爵䟽封是為極典人皆以為神榮守獨不然夫施厚者報必遐人之報神至矣抑所以為人報者宜如何哉繼自今疾疫水旱盗賊之事夷而驅之不懈益䖍則為不負斯人且不負國然則榮神者所以憂勞神也惟神其鍳之代祈雪祝文黄雲覆野尚虧大有之年皓雪停空未應嘉平之月敬列寸丹之懇冒祈三白之祥伏願大道垂慈真心從欲乗層雲之四合紛剪水之交飛嘘呵一彈指之間増華瓊闕慰滿諸有情之衆兆瑞金穰謝雪祝文六出愆時預虞災盭三熏卜日冒控懇祈香霧朝隮凍雲暮合側聴連宵之集霰幻成平旦之飛鹽曽謂愚忱獲通聖造不但来牟之呈瑞預占多稼之肇豐稽首知恩銘心歸敬更祈恵澤曲軫困窮臘瑞繽紛幸陽驕之已滌清暉澄宴庶隂沴之掃空坐俾耄倪同深悦懌代謝晴祝文千里瀰漫罔測蛟龍之怒萬家犇迸㡬為魚鼈之隣如疾痛疴癢之在身瀝心腹腎腸而請命為民抜難頼佛興悲雖罹墊者未免噬臍而瀕危者旋欣托足挽回赫日掃盡油雲自非曲假於䕶持将恐倍勞於爬櫛投誠以謝歸徳敢忘失之東隅收之桑榆誠傷心於已往介我稷黍穀我士女猶妄意於方来倘遂小心終依大覺代台州祈晴祝文八月之間而旱初懐焦槁之憂三日以往為霖旋軫漂摇之慮民之棘矣天維顯思伏念臣徳昩感通職叨拊字郡不斗大介於長江雨若盆傾莽然一壑上棟下宇西陌東阡皇皇萍梗之轉移在在黍禾之滅沒頻年積潦顧豈全無今日洪疇僉云大驟逺邇莫知其赴愬公私交集於號呼亟欵真游䖍修菲供伏願屏翳收隂翔陽返照吏如不徳𦵏魚腹以何辭民則非辜矢蟻忱而有請代詣大中寺再祈晴祝文寅賔暘谷凡兩拜於佛慈水出平原迄三伸於吏悃禾疇逺邇編户東西犇衝已負於力耕遷徙相望而如織浸淫不已昏墊奈何蠲心三寳之前請命十同之衆伏願慧光照耀覺力䕶持海若回瀾無復百川之汎溢雲師清陸亟還九土之清明怵廹投誠凌兢望賜又謝晴祝文愁霖冒野孰回川后之瀾杲日騰空訖正炎官之候敢謂愚誠之上逹遽䝉聰聴之下移天無一塵轉清於溽田有百穀似醉而醒偉用力之何神顧歸心之敢後害粢盛而作淫雨已消魯史之災多稌黍而歌豐年倚輯周詩之慶銘時齋銘銖根寸莖中涵天機或遲而茂或蚤而萎方其未苞千罌莫汲及其既蕚萬户莫蟄寧為故柏毋為新蕖委順知化溶溶太虛贊篔牕自贊以為似我我不欣以為非我我不嗔以為窮我我不屈以為逹我我不伸我鬚我眉我冠我巾惟寄於天地之内而游於天地之外是之謂神若然者不可得而見亦不可得而聞
