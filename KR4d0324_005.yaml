body:
  text: 篔窗集卷五宋陳耆卿撰書上水心先生書十月五日迪功郎處州青田縣主簿陳耆卿謹齊沐裁書再拜獻於崇福待制侍郎先生閣下耆卿聞道之在人猶日月之在天有晦有明而未始有泯滅也何也晦明者日月之光也人能以光見日月也而不能以光盡日月也故晦與明百千萬變不能損益乎日月之一毫道之有晦明非道也亦道之光也庸人之於道猶行者之於日月也行者一息不見日月則瞽其目矣庸人一日不見道則瞽其心矣詩書易春秋孔子發源之書也其所謂仁昉於易之元其所謂誠昉於易之無妄其所謂造端乎夫婦昉於詩之二南其所謂修身齊家治國平天下昉於書之堯典其所謂羞桓文而黜管晏昉於春秋之尊王經種子也四書藝之以為穀者也經麯蘖也四書釀之以為醪者也茹穀而思種子之功酌醪而思麯蘖之美此所以為善飲食者也今六合之士倀倀然其無所之者指先生之門以為户牖拾先生之咳唾以為八珍大饗也耆卿起山林中不敢自絶於斯道竊窺先生之學千載一朝堯舜禹湯文武周公孔子之道賴以勿替噓吸太極轇轕三光駕風鞭霆斡乾轉坤聞所著述有曰習學記言者天下學子爭師誦之期與古聖賢同一不朽而耆卿則未也今日之來惟提耳以告焉答王君夢松書七月二十四日天台陳耆卿頓首復書祕省王君足下曩辱惠顧猝猝不及欵繼奉手墨示以經史訓說二編勤甚厚甚觀足下之用心大槩欲刋落葩蔓而從事於本根之學又懼其力不勝從有志者問津焉而耆卿非其人也讀甫半病暍在告故未得一一考繹以附見其愚方憮然愧而來書復在門矣何足下訪我之惓惓而耆卿報之獨徐徐邪然此非本心也義理之學至矣或者求之愈高故去之愈逺要之主宰在心而其用散於天地人物日用常行之間逐於外而不反諸心者非也以為心最微妙而一切障塞其外者尤非也止吾所止物各付物終日酬酢而若未嘗酬酢者焉夫是之謂善用心大學曰定而後能靜易曰寂然不動感而遂通足下之學蓋欲進此所謂通天地制事物而不遺之語亦誠有察於是而曰初見其可守久乃泊無一物則毋乃察之雖明而疑之復甚歟夫心固無一物也而萬物之所宗焉物有一理理具一心古之人謂之心君謂之心官蓋必有所總攝於此而非泊然蕩然之謂也人必有是心也豈曰任其自為出入而無所用吾力哉孟子曰學問之道無他求其放心而已矣又曰操則存舍則亡操即守也若曰無物可守則操存之功何所措特所謂守者非曰守物守此理爾堯舜禹之執中是也來書又曰不用力則紛擾而失其統欲日夜用力則一毫無所加益味此四語益見足下切問近思之意然亦未察於勿忘勿助長之論而已所謂用力者豈是欲加益乎此理哉欲加益則是欲助長也助長之患勝於忘太用力之弊甚於不用力其要莫若主敬敬立則守固矣披閲旬日姑据所問以對更幸詳之不宣耆卿頓首上樓內翰書月日具位耆卿再拜獻書國史侍讀內翰執事某竊以文於天地間為物最巨放之則橫八極斥四海充塞乎宇宙之外嗇之則入秋毫卷一握掩閟乎塵坱之內抗之則翻沆瀣披鴻濛引星辰而上也抑之則洞山嶽達河漢決土壤而下也其清也則澄波月明寒松露滴孤鶴唳空驚鴻呌夕乙乙冥冥韻韶武而雜咸英也其壯也則崩濤裂山獰飈摺石雷車響空鐵騎臨敵震震栗栗絶甬道而赴趙壁也其慘然而思也則荒域悲風空山暮景逺客懷歸孤嫠弔影戚戚悽悽歌楚些而賦湘纍也其薰然而和也則春來東郊氣回寒谷發秀山川敷榮草木欣欣懌懌登春臺而歌壽域也窅窅乎其深而彰彰乎其明也愔愔乎其古而肅肅乎其澤也倐幽而忽彰驟巨而遽細恍乎其不可名也逺能見之近晦能揭之著泛乎其不可形也是非文之體歟論文之至六經為至經者道之所寓也故經以載道文以飾經文近則經弗傳經弗傳而道即不存也書之質詩之變易之動禮之宜樂之和春秋之嚴蓋與天地均闔闢與日月爭光明優優乎大哉必如是而後為天下之至文也已子思氏得之而中庸孟軻氏得之而醇屈原得之而幽莊周得之而博降是則有太史公之潔賈生之明相如之富揚雄之雅班固之典韓愈之閎深柳宗元之健元結之約李白之逸杜甫之工門庭軌轍不能一槩某少小讀書猥欲以文詞自命每一篇出同流歎譽之頗亦自以為不可及也年來悔悟懲創又自謂其可厭返求之六經又求之諸子既久爽然自失知向之學乃時文之學而非六經諸子之學也更以六經諸子涵泳演繹蚤夜不憊既久乃覺其胸中與曩者異把筆行墨稍洋洋然視時文之學或自謂逺過之矣然己以為然而人則不謂然退之云小稱意則人小怪之大稱意則人大怪之然則怪之者是歟怪於人者是歟以怪者為是則稱意不足道也以怪於人者為是則愈怪愈可賀也有一時之毁譽有千載之是非君子常懼夫千載之非不懼夫一時之毀使可以耀生前而不可以垂死後君子不由也又況天下之文章茍合乎古必不合乎今合乎今必不合乎古學者其求合於今乎其求合於古乎某佩執事之盛名四十年矣恨未得一望顏色以快此生去秋忽有以骩骳之文呈於堂下者執事實愛賞之以為近於古人之文夫古人之文人之棄也而執事顧有取焉將使世俗移其所以議某者而議執事某之歸感宜何如哉不逺千里俯伏於門蓋欲略敘此以祈一言之誨庶或有所持循以幾乎道而執事私淑之名善誘之功亦昭灼於無窮顧不韙歟昔李氏子蟠年十七好古文退之嘉其志作師說以貽之故退之之名與泰山北斗等高大某也年逺過蟠才不逮蟠而志則蟠之志也執事自許宜不在退之下執事其裁之不宣某再拜上蔡侍郎書正月吉日天台陳耆卿謹齊沐裁書再拜獻於詔使寶學直院侍郎閣下耆卿聞天之生物一也而有媺惡焉有貴賤焉媺而貴者生之甚難而去之則甚易也惡而賤者生之甚易而去之則甚難也故人之愛惜竒花如護寶玉而常有風雨霜露之憂至於野草之不根則隨剗隨植今日凋瘁而明日復翹秀矣此君子小人之喻而有國者之所兢兢也夫天之生君子也必間氣磅礴而後一見焉其難非止如竒花也而為君子者守道不阿去之又甚易也人之愛護之非止如寶玉也人之忌嫉排擯之又甚於風雨霜露之慘也夫以間氣之珍負守道之節生之既難去之復易以愛者之勤而又不足以勝忌嫉排擯者之酷君子之自立於世其難矣哉人以為難也而君子處之固易也其心以為天之所以豫我者貴矣而其所以自貴者在我抗而上之吾自若也抑而下之吾亦自若也故其窮達禍福不足以為一身之休戚而常足以為一世之輕重聞其進於朝則躍然而喜聞其退於野則慘然而悲聞其有所施設而獲遂也則以為天下賀聞其有所扞格而不得騁也則以為生民之寡祐而治世之難於接踵也夫為君子者豈以聲音笑貌賈人之悅已而得此哉光芒之注射風聲之披拂鼓一世而樂趨之雖萬里之遐千歲之久而人之所以歆艷慕用之者不膠漆而固也耆卿兒童時即知閣下以光明瑰瑋之文雷霆六合其咳唾珠璧朝落京師而暮傳嶺海以視漢賈洛陽未知其孰後孰先也已而閣下位日尊名日高而人之歆艷慕用者望而難即蓋所以屹然砥柱於一世者德業行義動皆範模而耆卿向日之所聞者特其文爾夫古之文非綴輯絺繪之謂也必有根株醖釀豐碩而後葩藻蔚然隨之使徒以糟粕眩世而索之則窮摧之則敗此流俗之文而非閣下所貴也閣下正而非固和而不流其未更化也未嘗見其少貶於宵人之黨也其既更化也又未嘗見其茍同於君子之徒也進而從橐退而帥閫又退而祠庭卷舒闔闢如機之旋而未嘗有幾微見於顏面雖使小人之巧於忌嫉排擯者欲摘其白璧之瑕以肆其毒而卒無間可入焉此耆卿之所以願見下風而再拜以頌也夫其在從橐也人曰不久可以大用而澤四海也其在帥閫也人曰不四海而一道澤未遍也其在祠庭也人曰一道已狹矣而又蟠屈於家吾未知君相意也雖然天而未欲行道則已果欲行道也其召之未晚也今果召矣則又曰天果欲行道矣向之所謂大用而澤四海者今有其日矣某利某害某可某否閣下之方寸當自有權衡焉此耆卿之所以願見下風而再拜以請也耆卿少之時但知有舉子業既不利則棄之而學為古文煆鍊鐫磨不底於詰屈聱牙則不止已而自厭則又棄之惟欲浸灌乎仁義之淵菑畬於忠信之田窮經汲古以終天年而世俗之所謂得喪榮辱者曾不芥蒂懷抱矣晚竊末第邂逅入覲始得俯伏道左以吐所懷行或使之此豈可謂其非天哉平生著述頗多筆札未盡具詩文一編姑以藉手閣下儻有意教之當嗣此以進也不宣耆卿再拜代通王舍人書月日里人姓某謹再拜致書侍講左史舍人明公某竊惟天下之人情每騖於逺而玩於近非近之可玩也食於魚稻之鄉者賤螺蛤輕魴鯉而至於淮白吳鱠巴蜀之蹲鴟獨垂涎焉其於山水也亦然聞巫山十二峯之竒往往欲乘風鶱舉至於家在天台鴈蕩之側雲靄交於耳目乃不能一託足聞洞庭彭蠡之雄險可怪慨然起乘桴之興至於身濵大海蛟龍之波與户礎相接乃不能捶鼓叩舷以覓一快其於人也亦然見交廣一隅巴蜀萬里有秀士文人嶄然露頭角往往願見不可得至於名公偉卿近在邑里桑梓連隂松楸接幹則每每汩沒自障不得略窺光采以自濯焉玩近之弊一至是邪伏惟明公碩大高明鯁亮淵特名揚於帷幄而聲震於軒墀東西南北之人耳聞公名結裾斂袵效荆州之識而希季布之諾者滿眼皆是而某以桑梓松楸之舊獨不得一見天下可恥之事孰有甚於此者昔者竊聞之至賤託於至貴王承福之圬託於韓退之而顯郭橐駝之種樹託於柳子厚而顯圬也種樹也藝之無足道者也而猶若是況大者乎某少而讀書長而砥行織文擷往哲之餘芳漱前聞之末潤有年數矣雖不敢妄自菲薄貽斯文羞然度未遇名公偉卿為之印可是猶衣不溫而食不飽也輒以近作二十篇藉手自白執事試取讀之示可否焉不宣代上樓參政書月日具位姚某再拜獻書宫賔大參相公閣下某聞天地之間氣蟠結為山嶽流暢為江海而其扶輿磅礴之極則鍾為名世之君子然山嶽河海可以常有而名世之君子常落落然故人之視山嶽河海者雖高且廣不甚以為異至於一君子作於世則雖里巷之兒童營壘之卒伍亦皆咨嗟歎息喜愕慶幸以一望顔色為終身榮賢於此者可知也蘇子由生於西蜀懷竒挾邁使其高卧岷山之雲而噓吸峩眉之風月豈不足以忘死而乃赬肩繭足萬里而來京師其所自述則曰於山見終南嵩華於水見黃河於人見歐陽公而已士之樂得夫君子也如此哉其後歐陽公一置齒牙而子由之名遂聞天下人見其如此而不知有以為之先也蓋自老泉先生以六經論謁公公即掀髯愛賞以為荀卿子之文且以其書薦之朝幾以為古人復出當是時老蘇既顯矣一子繼之遂皆䝉國士之遇非此父固不生此子非此子固不肖此父而非歐陽公之特達則委棄泥淖人亦莫知其為蘇氏父子也若某者誠不敢望子由而閣下非歐陽公之徒歟閣下之道德天下共知之其文章天下亦共知之其為歐陽公蓋庶幾焉而某也獨無以自達於庭豈惟閣下棄之將舉世棄之矣雖然有一於此昔者先人官於鄞川鄞川閣下之鄉里也三年之間餐和茹教投分最昵其後得侍同朝所以眄遇者益深視歐陽公之知老蘇無以異也以老蘇視先人則所以知某者當視子由然昔之子由能遇歐陽公於老蘇之生前而某之今日未能遇閣下於先人之死後此其故何也意者某之自畫而不進也夫子由之入京有萬里之遙苕霅之距行都一葦可至而某也不之至其自畫昭昭矣然尚有可諉者蓋聞古之君子修其身而後可以求聞於人閣下方以道德文章為時匠石而某抱其無用之識以求進於閣下無益祇取辱耳自時厥後矻矻偲偲非聖人之書不讀冷官三載日與學者磨礱乎理道鞭策於教化浚之日深築之日高庶不等塗之人雖倥侗如昔疏魯如昔亦不可謂懵無所見者蓋前日之不進正所以為今日可進之階也失此不前真自畫矣昔某之高大父蓋與老蘇同為歐陽公所知嘉祐定禮實付之二人之手往者閣下之在中都嘗親跋其堂牒矣百世寶之固將與尺璧同價也然蘇得子名益彰姚之後未有甚顯者故歐陽公之所以施於蘇者類厚而所以施於姚者幾於不繼繼之者在閣下閣下其進教之則區區之愚可以悉吐於階戺而不自暴於草莽鴻毛之名一日達乎四境人將以為蘇之父子發早而不長姚之祖孫發遲而實大蓋蘇之所遇一歐陽公而止姚氏得兩歐陽公焉若之何弗榮此亦閣下所以親跋堂牒之意望終惠之不宣某再拜代吳守上水心先生求先銘書四月日具位吳某齊沐裁書再拜獻於觀使待制侍郎閣下某竊惟天地之大以其能榮枯萬物而生生無盡也然枯其榮者易榮其枯者難繁霜之晨積雪之夕凡物莫不隕柯禿葉摧香奪艷凛凛然不能自必其命及夫春陽一煦鼓之舞之則煥然日新劃然霞湧凡枯者未有不榮者也故能榮物於既枯者天地之神機也人者物之靈也物枯能榮而人死則終於死也人固不及物邪雖然人固有可以不死之道也今夫爵命之穹窿足以尊其生而不足以尊其死車服之烜麗足以華其生而不足以華其死凡百可喜可玩之具足以樂其生而皆不足以樂其死也惟有功伐德美得附麗於良史之筆則不爵命而尊不車服而華不可喜可玩而足樂死猶生也夫物之枯而復榮者特可榮之於一時而人之死而猶生者可生之於百世物固不及人矣雖然史法至近世略矣非大官大職及天子之所旌别而顯異者不得預雖有功伐德美往往蟬蛻於摧簷敗壁之下蟻腐於荒林幽墟之側其遺落可勝道哉故天下之人進而不得附於聖世之史則退而求託於宗工巨伯之文蓋附於史則為傳而託於文則為銘使人雖死而猶生是或一道也仰惟閣下以五百年間生之材而抱千古不傳之學發為文章真如春陽之氣斡乾轉坤而包宇越宙無往不在而無物不該故今天下人子之欲顯其親者不以得三公九卿為榮而以不得閣下之一言為恥中州近壤遐陬僻嶠咸曰水心先生銘我則死猶生也雖使韓柳歐蘇疊足於世其述作能如閣下之盛哉夫人而求之不能人人而豫之也豫之者近或二三年逺或十年其難如此而求之者日益衆或寢苫方新或登門未久而銜哀請命者踵相躡也某之先君子實歿於紹興之甲寅二十七年矣某之侍閣下實權輿於淳熙之戊戌四十四年矣視前所謂方新而未久者可謂過之而猶躊躇以至今日非忘之而不求蓋欲求之而不敢也其意曰彼求者之多也豫之不暇遍也以某之不肖而又譊譊於其間其進之退之恐未可必也歲在壬戌侍坐隅於京口酒畔跪陳蓋嘗微發其端而未能畢吐其傃負此耿耿又二十年今投跡山城距鄭鄉一葦此天與之便而先君子得發揚之秋也故每一東望未嘗不慨然以思而慘然以悲欲躬走數仞之牆且泣且請縻係尺組心馳而足不赴用敢瀝其區區之欵以徐公子才所述行事瓣香而投誠焉重念某先君子少而孤羈晚而坎凛其志非不慕古人其才非不若今人而天嗇其逢如水渟澤故不得以豐功偉績鏗戛震耀而其粗可表見者僅如疏星掛曉微茫一二而已死而得傳則視世之豐功偉績固無以異也不傳則零落翳墜抑可痛已日月雙馳霜露幾感頭白如許衷丹未抽其何以立士民之上而教世之為人子者哉難逢者人易失者時閣下許之則某親之死猶生矣拒之則某親之死真死矣雖然以某二十七年之摧割與四十四年之邂逅抱夙心而遐慕揮老淚而近訴閣下其能忘情乎出春陽之膚寸頃刻噓舞之此天地榮其枯之術也某俟命不宣
