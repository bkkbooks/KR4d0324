body:
  text: 篔窗集卷六宋陳耆卿撰啓賀石察院啓親奉詔除進膺言責宫庠典教已觀時雨之零憲府宣威又見清霜之肅得輿烜赫賀厦紛綸竊以遇合之難古今所共可用不用者既以無其時為恨欲言不言者又以非其職為辭讜論所以無聞治功終於不立誰為砥柱障此頽波恭惟察院矩度清嚴氣質凝粹扶持正論非堯舜之道不陳攘斥異端豈管晏之功可許允為師友漸摩之懿實出父兄傳授之真醖釀豐餘發舒演迤屬聖主厲精之旦正哲人眀目之秋爰被褒遷雅當排擊惟今日之宿弊比往年而未除公私俱貧上下胥慢控邊之地未識耕桑字民之官居多漁獵凡此海內之庶務決於臺中之一言豈徒抨彈紏決以掃去客邪亦欲優飬調胹以復還元氣佇觀逺業不愧前修某猥以孤生近瞻大雅誨掖有加於顏靣感戢莫既於形容濶逺仭墻稽違尺牘屬除音之到耳覺喜氣之填膺不事諛言見此日敬公之至僭陳愚慮恃平時知己之深代通宣城葉主簿啓幸均簿領貧家終藉於富鄰豈乏交遊他人不如我同姓宿舂已戒晨謁有期恭惟主簿朝議天分自髙學力尤壯滌襟懷於雪碗可見清涼誦騷雅於風簷足占芳潔盍備漢廷之搜選乃尋潘縣之勾稽少抑何嫌髙飛可待某族寒南阮心尚諸任謾踴躍以效顰真嶔崎而可笑北胡南越莫拘二邑之疆圍伯塤仲箎擬比一家之音韻賀倪兵書啓渙號宸廷升華武部十年去國聲名標四水之清一日還朝步武接九霄之峻吾道未嘗終否公論其可厚誣一讀除書四馳慶牘恭惟侍讀判部尚書氣吞河漢望壓岱嵩早嵗兩科健筆聳聞於天下晚年孤節英猷逺震於人間道大者合難才髙者忌衆不肯附炙手之熱其能為繞指之柔簸弄煙霞摩娑泉石俗子固尤其睨物賢者則識其憂時間以明目張膽之忠見於流涕痛哭之疏此時此意孔武孔嘉屬琴瑟之更新首弓車而圖舊惟昔之磨光鏟采既非往而不返之流則今之舒翹揚英當為來者無窮之畫時雖偃武事豈具文筆端巧敵於金湯胸次綽踰於兵甲識鄭公之履姑暫依於論思補山甫之衣行大占於經濟某自憐膚短雅企清崇雖神馳於書策琴瑟之前而分隔於灑掃應對之末何其幸會見此休明因知嶽瀆之炳靈當使乾坤之吐氣字鴉霑濕已傳聖主之恩濃語燕徘徊不嘆癯儒之命薄賀董司諫啓渙寵龍墀升華騎省雖規諫諷諭之職視昔不殊而獻納論思之聨於今為近氣伸骨鯁喜動髦英竊以繩愆紏謬之官古人所重補闕拾遺之任近世益尊自垂拱之標名至雍熙而易號員析左右權分重輕匪資直諒之才曷稱便蕃之選得人若此吾國庶幾恭惟侍講司諫氣育青霄業傳繁露遵堯舜文王之正道以覺斯民為稷契臯陶之良臣力行所學一言寤意三接疏恩森嚴白簡之陳風銷羣枉剴切青蒲之奏日照孤忠聲名占諸老之先眷簡號一人之最肆膺晉擢允穆師虞言行而道亦行固可卜諫官之操已正而物自正又欲觀大臣之風倚疇庸於七人亟躋榮於四輔拜麻有信汗竹以書某辱門下知讀邸中報喜不勝情而折屐屢矣賀必欲靣而朋簪闕如顧區區無盡之懷寓云云不腆之贄摩挲松菊雖細吟元亮之詞模寫臺萊尚擬詠周人之雅代賀趙户侍啓一札宸廷二卿計省往時疊組名尚混於執圭此日出綸位正聨於鳴玉俾膺渙渥咸賀泰亨竊以弼五服以至五千職嚴民部亞六官而屬六十權重邦經矧貨泉壅塞之秋正君相焦勞之日王衍清談無以活國𢎞羊心計幾於病民有闔有開惟才惟德肆疇咨於朝路果無易於我公恭惟判部侍郎百世宗標兩朝人傑撥繁剸劇解數千牛而創有餘騰茂蜚英搏九萬里而風在下旋由星使入踐月卿有嘉幹理之勳併假論思之寄俾之共二雖堪儀羽於百官視此無雙非可淹翔於九列爰頒異渥特畀真除鄭武公為周司徒前彛具在李適之號唐賢相舊事可期佇攄久大之模永翊升平之之遇某比聆鳯詔嘗羾魚書正共喜於得輿乃重欣於賀厦荷方佩紫己觀君臣同德之歡粟倚腐紅寧復上下交征之患永言舞手莫竟濡毫賀浙東倉程郎中啓顯被絲言榮將繡指遡江而左刺史之雨方霑環浙以東使者之星丕耀易逺而近有卑與尊此聖君簡記之隆亦賢者亨嘉之漸恭惟提舉寺丞郎中英猷照世碩略傳家遊創而了八荒擅庖丁解牛之妙揮鞭而騖萬象過王良御馬之工醖釀豐餘薰蒸傑特乃若辭華之彪炳發於翰墨之淋漓結綬方新褰裳更早旋以青縑之直俯為皂蓋之遊春滿九華風傳乙陛偉矣報齊之政喧然借寇之謡其如攀轅卧轍之思未若攬轡登車之寵肆攽紫渥亟畀皇華惟俗儒以趣辦為工而明主以拊摩為悅雖摘山煮海之富國用所資然焚林竭澤之窮民生安賴光華六轡聳動七州必有通融補助之方以演輔贊彌縫之手非賢不乂惟乃之休某犬馬飢軀江湖倒影始是春間之桃李今為霜後之蒹葭幸甚一㕓獲依大厦託原隰舒長之蔭誰其私布於腹心述閭閻纎悉之情或者仰禆於毫髮賀嘉興守喬編修啓疇庸嚴陛徙鎮輔藩何武去見思遺愛滿淮堧之左叔度來何暮先聲喧浙水之西越在受㕓倍欣賀厦恭惟判府編修校書氣奪東陽之秀學傳左浙之雄富撑腸拄腹之書笑空襟佩獻流涕痛哭之䇿驚寤冕旒共推江夏之無雙辱在杜牧之第五深沉册府燃藜髙蹈於前聞密勿宥廷執簡共推於妙手久結知於諸老肆惓懷於一人收斂經綸逡巡拊字偉鴻鴈安集之政空邊方窺伺之謀白日桑麻黃雲黍稌念民俗欲均於逺邇而帝意亦酌其重輕易地懋功自天疏渥惟嘉禾之勝圉號檇李之名區地接股肱旁通一水勢同唇齒密扈九重開藩俶際於循良匝境陡新於燕宴儒效已試民庸益章想不俟於突黔已立攽於詔紫某同朝臭味並舍交遊去國翩然極仰抽身之早攜家屬耳自慙問影之遲敢云甕牖之凄涼辱𨽻鈴齋之赫奕光我桑梓施於松楸雖燕鴻縱迹尚有差池而虎鼠機緣本無限斷我泉方渴正思涓滴之功君藥已靈願乞刀圭之賜賀張參政生朝啓日逢弧矢年迓松椿有是君有是臣亶謂千齡之盛旦俾爾昌俾爾艾式逢八月之清秋樂事駢闐歡聲環匝恭惟觀使大資大參相公儲精嵩嶽育秀苕川碩畫元勛久增光於政府沉幾深識獨軫念於邊庭雖一時議論之靡諧奈百世聲名之益壯雲霾既掃日月方明爰誕告於治朝以寵還於書殿早符夢燕入相衮龍發舒未究之才猷揚厲無前之勛業某比聞褒渥率羾慶緘犯嚴宜掇於深辜藏疾已欽於雅度報章下逮餽禮有加坐令山房岑寂之區如得洞府珍竒之玩有懷銘刻無語發揚屬逢誕月之臨敬致長年之祝捧觴稱夀雖不能陪賔客之塵舐鼎得仙猶足以解塵埃之縛賀青田丁知縣啓出綸鳯陛結綬芝田地擁羣山正欠河陽之春色天連一水已聞卓茂之風聲斂衽何多摳衣甚近恭惟知縣朝議博衍無競髙明有融吐秀名邦燦文物詩書之會象賢名閥儼衣冠禮樂之儲才髙而宅之以和識逺而韜之以晦人方奔走我獨笑談故雖繁劇之屢更未當扶搖之一息謨猷星幕蓋周家圜府之遺管鑰日畿亦孔子乘田之謂舉頭雲路掉臂雷封豈矯為髙世之蹤殆不勝愛民之意地雖斗大事亦絲棼彼神人之怒方瘳旱魃之威復甚近甫雱霈猶多煎熬想目連桑梓之隂已手辦稻粱之種只虞召馹不待飛鳬某戅且無他窮頗自笑泛濫於百家諸子極悔少年繪畫於三史六經姑俟來哲豈謂漢庭之科級亦關陶徑之榛蕪責以勾稽非其講畫聞慈君之戾止覺短簿之欣然豈惟竭筋力以奉教條亦欲披腹心而效忠欵鑿匡衡之壁儻容分一線之光登單父之堂或可飽七絃之韻望塵慫恿伏紙勤拳代賀應大諫啓渙恩宸扆晉長諫曹凛然五院之綱維突黔未久藉甚七人之領袖詔墨又新人驚遷拜之頻天假治平之近竊以箝口結舌之態小人以為智而弗以為欺犯顏逆耳之風君子謂之忠而不謂之激故魏徴以諄勤植譽而陽城以濡滯見譏矧桑林躬禱之年又衢室大詢之日茍提衡挈領之地不畀髦英則隨波逐流之餘疇聞鯁亮舉世共仰惟公克當恭惟侍講大諫道備董醇望隆汲直溫然接物如春風和氣之可親勇以行仁類烈日嚴霜之難犯惟任重道逺之事與謨明弼諧之功往年素習於講明今日飽覘於施設自聞鴻漸屢見鳯鳴便蕃接晝之榮揮霍橫秋之氣故公論以為司命而善類於焉主盟肆疇白簡之庸首進青蒲之直事權逾赫威望增崇惟一人之簡注既隆故多士之傾瞻尤切堂堂補衮匪徒本數末度之間諤諤引裾夫豈巽入柔行之謂某比馳慶牘又覿除書咸云近水之鄉即是先春之處胡能分竹但知地靈人傑之雄更擬靣槐及見天芘神休之盛賀鄭大諫啓疇庸橫榻正位上坡白簡含霜稔著埋輪之望青蒲映日峻躋入閣之班播頌揚庭歌謡盈路竊以國家之事惟宰相可行諫官可言紀綱之司乃君子所恃小人所畏世道雲翳人情日偷靡聞諤諤之昌競取容容之福以依阿淟涊為圓熟以慷慨激發為迂狂不知名稱之謂何乃忍波流而至是誰一舉手惟三折肱恭惟侍讀大諫學洞索丘量涵海嶽移治外之功以治內粲然經國之猷推正心之學以正君卓爾尊朝之望橫飛直上特立獨行崢嶸五院之聲名密勿九重之意眷惟激濁揚清之際與獻可替否之間有重有輕孰先孰後爰輟才於排擊俾一意於論思深惟古人蹇諒之風不若後世煩苛之甚韓愈之譏陽子首陳時政之瘠肥盧同之歌鄭公獨問民生之蘇息蓋事以大原為急而言以切中為竒詎尚支離以滋惶惑雖大雅自有成畫在宵人姑以效愚某觀古多賢疑今罕遇何意讀開元之報恍如歌慶歷之詩喜在胸中溢於言外見明目逹聰之日已知天地之重開想犯顏逆耳之風彌覺雲雷之加壯嗣聞褒制別貢慶箋代賀台守俞寺丞啓勇釋朝纓甘紆郡綬君子之教五舊聞濟濟多士之依諸侯之寶三行快熙熙庶民之覩獨慙下乘猥占先驅雖同千里之歡彌積一身之愧恭惟交代判府寺丞日邊佳氣雲表修名筆下宫商富錦瑟五十絃之奏胸中斧藻森牙籖三萬軸之儲甫䇿足以居中忽掉頭而請外蓋古人進退之審豈謂身謀而賢者去就之明誠關國俗優詔四逹歡謡一新懸知仁聞之大行且使德音之普暢笙歌隴畝鼓舞江山要看六合之經綸視此一州之撫字某老技已罄歸心欲飛惟餘秕政之存以俟棠隂之覆觀在昔交承之契至於遺厥子孫逮末世澆薄以還不啻視如塗路孰恢此誼允藉我公續前召後杜之歌寧免秕粳之誚誦左禹右臯之事尚圖藥石之求通兩浙漕章郎中啓瞻兩道光華之盛爭欲駿奔顧一階塵土之微等容蟻附最幸枯零之下走偶逢傑特之良工未慣馳驅已酣鼓舞恭惟都運寶謨郎中浩氣充塞神機昭回寶鑑懸空妍醜何逃於絲髮黃鐘在簴疾徐丕應於宫商自甲辰題塔之初迄嘉定改絃之後巋然伯仲籍甚聲名合接武而登廟堂乃掉頭而去江海辰猶入告天意為開方虛獻納之班又屈咨諏之寄永惟京畿之飛挽獨髙海宇之轉輸足食然後足兵信當世唇齒之論富民乃能富國蓋古人心腹之謀因知前舳而後艫不礙左餐而右粥惟威名震逺則豺狼之羣立空惟精誠照微則雀鼠之訟幾息疇今十使能此幾人便當沛傅巖之雨以沐浴江山詎止張益部之星而熒煌原隰伏念某古心凋朽世法迂疏入眼光隂半是艱虞之日月隨身簡軸粗知土苴之乾坤使筍蕨以長肥甘松篁之偕老未能免俗浪曰為貧深知塵埃箠楚之勞亦助禮樂詩書之化斯道何道本元盡出於禔身能心其心功利亦足以及物獨念道塗之躑躅預憂末路之竛竮幸有澄清為之覆冒得蕭何而任轉漕豈止為子房韓信之儔遇劉晏之領度支或可備裴腆李衡之數僭狂發論局蹐矢懷通處州林判官啓尋枳棘之棲自嘆書生之分薄睇芙蓉之幕極知賔采之望尊挈此塵埃麗之風日已溢我心之喜未為斯道之窮恭惟僉判中大南國名賢東嘉甲族植操孤整淡無辱以無榮受才閎通歘有張而有弛一官遊戲萬口歡欣勾稽嘗見於腐紅步武今淹於泛緑郭子儀之羅絡雖六十人烏大夫之招延止一二輩已振飄飄之氣居多贊贊之思拄笏棲遲想笑昔人之誕放著鞭騰踔宜乘今日之清明某戅不偶時窮惟好古效子虛上林之賦少已自嗤歌生民清廟之詩老其誰懟到頭一第滿目百罹豈諳下走之簿書幸託元寮之芘覆勿云異縣難塵君子之齒牙或遇同堂願假小人之羽翼寸丹欲露尺素難周代回南劒劉守謝特薦啓八郡星羅獨仰分魚之最一章露奏敢論薦鶚之功咨諏蓋出於公言披拂過形於私謝珠躔奪目圭復汗顏恭惟判府寺簿挺特吏師瓌閎人傑長才剸劇發硎肯綮之間精識造微作炳眇綿之際勇辭朝紱自詭郡符以拊循民瘼為本心視通衍貨源為餘事水騰雙劒已喧借冦之謡雲望九閽共徯徴黃之渥某職叨使逺心切貪賢循良幸際於一夔曠戾足寬於四牡枝言贅矣襟誼凛然指有若以為師竊駭成蠅之誤俟漢家之選俊行修賀燕之恭代賀婺守林侍郎啓誕膺播告洊屈蕃宣輟申伯於南邦方抱去思之恨借袁宏於東郡更騰來暮之謡吾道固無戚欣上意則有輕重一敷綸綍交慶簪紳恭惟判府待制侍郎識羅八荒智括萬宇撥繁剸劇飛雷雹於掌中摘逺鈎深宿乾坤於胸次入儀左户出餉長淮荀氏居軻雄之間論明富國劉晏為管蕭之亞功在斡旋盍趣召於論思乃分勞於屏翰眷言二浙近説雙溪嵳峩鮑令之巗寒冽休文之井久焉湮鬱今也發揮惟聖明曲軫於閭閻雖僻逺亦關於堂陛剝膚椎髓下已極於啼號出羽鑽皮上正勞於欽恤還之醇郁屬我老成佇看慈祥樂易之規以試光明久大之業民今幸會國亦庶幾某局促儒酸紛拏吏壒頃浪陪於朝迹旋竊詭於民庸惟昔采芹似信耳聞之易於今剖竹不知躬蹈之難周章自憐躑躅誰訴幸早親於玉峙今密邇於寶鄰敬布腹心擬同唇齒仁聲載鼓未應殊楚越之觀舊盟未寒尚許法龔黃之政代回臨海元縣丞啓坐堂而見諸生甚慚非據佐邑而有賢者喜獲相親雖政事文學之殊科想臭味襟期之卒合未酬覿靣已若論心伏惟知丞朝奉識度粹夷才猷敏卲往年發聞已恪勵於操修此日效官咸飽觀於施設暫隨芝檢來贊花封惟繁劇可以見人惟勤勞可以及物勿謂簿書期會之冗有妨聲名事業之崇但蓄此心何憂不濟某自憐白髮強領青襟蹉跎畫餅之才積習素餐之愧近聞至止不覺欣然方擬貢於慶緘乃首貽於問牘褒情何腆絶知君子之謙報語匪工益重小人之過代回仙居楊縣丞啓早同州里僅聞關西夫子之名晚並官僚始讀藍田縣丞之記拂塵埃於坐席洗忡惙於襟懷伏惟知丞朝議矩矱德仁箕裘忠孝功名外鑠俗眼自有疾徐道義中函吾心初無愠喜何其處也止或尼之自一拾於藍袍凡兩參於油幕屬更化瑟俯佐鳴琴非惟見難進易退之風抑亦是小屈大伸之理某浪言采藻未遂及􅏨見鄉人如空谷之足音瞻從者若旱苖之甘雨緘題首及已得君於眉目之間臭味儻投幸索我於形骸之外回青田陳監稅啓迢遙千里邈焉同姓之追隨左右一官幸矣鄰封之遇合飛文到手布武歡顏喜秣馬之有期愧傳魚之已晚伏惟監務舍人性姿間敏術業疏通潤物潤身盍早厲摶鵬之氣聞詩聞禮乃暫從冠鶡之遊屈此津衢留之管庫永言山水之縣亦號舟車之衝急之則似析秋毫緩之則匪徒天雨孰明此誼今得其人毋嫌一閧之喧卑實釀九遷之赫奕某強脫書案浪登宦塗顧已責之未逃豈他曹之敢問期君奏最俾我蒙成勿學研桑顓守富強之䇿當師孔孟溥行仁義之言代通婺守孟侍郎啓學拊字於偏州偶玷台星之耀接蕃宣於巨鎮幸分婺宿之輝雖地望逈隔於崇卑然臭味寧分於彼此息肩知幸拜手投誠恭惟判府待制侍郎莊肅而閎深疏通而簡諒博學多識富宇宙之瓌竒廣納深藏浩江河之膏潤偉矣尊朝之望卓然經國之姿有弛有張不吐不茹踐郎闈而躡卿寺早到雲間持使節而綰守符幾半天下旋馳驟乎六卿之二盍翺翔乎四輔之聨勇謝褒遷甘從拊字公固不以自挫人或疑其太淹誰知致君澤民之方本無居中在外之别古人迹絶俗吏肩摩獨以平易寬博之心而行慘怛愛利之政龔黃已試誠聞疲俗之來蘇嚴樂未歸恐緩嘉猷之入告佇揚六卿三事之拜以慰四海九州之瞻某蹇武自憐壯心空在周行濫次徒包玩愒之羞近甸承流偶遂迭更之請在泮恍思於陳迹于蕃何有於新功幸邇髙明足寬罷懦雛鶯出谷定知律吕之未調良驥過都所喜鞭弭之在望通青田李知縣啓銀袍謾脫誰憐短簿之塵埃墨綬焉依幸有長官之風鑒仰髙久矣事大欣然未為人事之好乖或者天憐其寡合恭惟判縣朝議故家文物名閥典型一洗而凡馬空才豪無敵四顧而全牛解政妙有神間以翰墨之淋漓寫其胸襟之樂易擬古詩伯為今吏師桃李之種何如蓬萊之頂可躡一發已中再鼓愈強故以王葉縣飛鳬之蹤來尋丁令威化鶴之處為子民而髮白公豈汗顏論許國之心丹人方斂衽某孝未盡性事惟信心驅馳場屋之中幾成退鷁搖落江湖之上每夢盟鷗吾道未灰斯文如日或者窺斑於先哲庶幾藉手於將來悽其抗走之曹誰是扶攜之地大厦在上髙風可憑庶容婉委以匿瑕抑可優遊而全璧仰瞻􅏨戍幸公旬月之留只恐芝函奪我三年之芘代回長亭徐監場啓遊前輩之門熟窺家學客諸侯之國復玷官聨契濶往年遭逢此日首辱朵雲之翰如聞空谷之音伏惟判院朝議儒家者流名父之子教傳詩禮蚤騰踔於諸公書擅賢能偶蹉跎於一第晚超京秩暫典醝征洪鐘雖咽於微撞良玉亦占於始斫勉行其志勿鄙厥官倚觀經畫之才用作調和之信某暮年薄宦多病浸衰藥褁纒綿祇速馮唐之白書囊岑寂何心揚子之玄無補友朋私慙祿食幸故人之將至覺老眼之忽開淨掃吾門不是塵埃之客亟驅君馬來辱文字之盟
