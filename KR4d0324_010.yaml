body:
  text: 篔窗集卷十宋陳耆卿撰五言古詩間居雜興六首萬化逐流水一往不復回昨日欄中花今晨安在哉焚香心如氷未受寒暑催贈花以片言自落還自開稷契不眀經伊傅不決科方册鐫勳名千古光不磨百年等一死自立須嵯峨啾啾候蟲鳴辛苦如之何墻西幾篔簹我昔手所種年來飽風露錦綳紛錯綜種善如種竹此語合擎誦眇然方寸間仁不可勝用我不學椘人滋蘭以自馥亦未羡東陵種􅏨以混俗富貴自有時貧賤寧可欲逹則濟四海窮則獨善足狂颷捲春去永日送夏來天地一劇戲役人如嬰孩借使長青春人生能幾回仰羡松心堅雪裏常崔嵬爐煙上踈櫺閉戶白日靜堯舜亦人耳萬善吾所性紙上空支離言外獨輝映一笑千載寬此樂無終竟以新涼入郊墟為韻簡葉孟我丈日月不相貸四序如昏晨話秋即秋隨化工一何神今年既悲秋眀年復懷春人心有去來天道無故新警夜聽鳴蛩聒午聞啼螀不知誰使令萬態俱悠揚宋玉辨已非歐陽賦何忙正念有氷壺日日如此涼世事如車輪可旋不可執得者未須歌失者何勞泣我觀人心躁甚如西風急役役幾時休山林可深入平生一飽足大宴非珍肴秋月拓綺羅秋風奏笙匏問此有何樂無樂樂乃髙琴書足匡坐干旌謝在郊蕭散不耐事常甘賓客踈不見葉夫子我心却躊躇願勿寒前盟相從帶經鋤羲黃未埃塵周孔不丘墟種菊手種黃金花摩挲待其成朝來風雨過萬彚秋竛竮起問花知不獨立常亭亭嘗於清霜下退然得此生南山與東籬我亦學淵眀久落塵網中問花花不譍和芥庵韻孟軻談一本孔子號無我聖賢超警趣不作流俗􅑁故能貫堪輿中立而不頗黃冠宗無為衲子只打坐言若髙峭甚又與聖賢左須於真實處大海穩扶柁須於疑似間曲戶牢著鎖世道震遂泥人心履俱跛競作夔憐蚿徒勞螟祝裸芥庵之心鏡淵珠光徹顆常時足歡娛此日類坎軻乃能貞其頥不為名利朵敲棋聲落枰哦詩氣摧垜此外淡一視泰山如草蓏未妨師孔孟匪涉佛老惰汩余抱孤戇匪惟縶庸瑣涉世雖云濶詣理猶未妥正性水下月邪焰風中火因子當自強朝聞夕死可夷齊咏商道昔波蕩周王網九圍二子如冥鴻翩然獨髙飛周粟固可耻薇亦周之薇云胡挾孤憤了不悟衆誹天地有正氣日月無斜睴惜哉權一字謬誤無已時武德紂之虐賢者誠知之為欲扶此教之死不願違吁嗟臣道薄千載常凄其欲上西山望草際露未晞七言古詩種麥按全芳備祖題作艱食行新榖未升陳榖罄宵人托麥以為命今年種麥如去年去年滿屋今空田吁嗟皇天毋乃戾去年浙右當死歲湘中死冦淮死兵留得東州僅旒綴只今艱食遽如斯豈是造化有乘除我無一語活四海對之泣下徒霑裾催租官吏如束濕里正打門急復急眼中安得豳風圗繪出麥田蓑與笠按全芳備祖作安得君眼如月長灼破田家蓑與笠題湯正仲墨梅間庵筆底回三春平生愛為梅寫真只今龍鍾已八十雙瞳挾電搖青旻芒鞋轍迹半天下學語兒曺讀君畫孤根踞鐡幾經年轉作平梢月倒挂我家破屋同蝸牛素壁懸來春復秋試擕纎練覔天巧門外觀者何其稠真花著雪苔枝醜君為描摸應添瘦朝開暮落春不留豈若墨本堪不朽臨風靜玩意趣長何當爛熳揮滿床孤山老人醉中見便欲信手賦暗香五言律詩東郊要拓郊原眼短笻扶我東秧寒針怯水麥熟浪酣風古寺荒煙外孤禽落照中得醪嫌獨醉猶及灌園翁夢林雪巢感舊空黃葉經時又緑苔未應天上去猶解夢中來雪亦本幻爾巢今安在哉淋浪詩萬軸花鳥自驚猜過龍潭澳久濶松楸信因為龍澳來四山黃戀葉一水緑澄苔地曠樵聲出天寒鴈影回無人且無酒清坐興悠哉磨鏡蠧蝕寧堪久挂揩長恨遲浮雲手底盡眀月眼中移鑑垢渾能治心塵不解醫休云磨者賤此是主人師七言律詩春日書懷間來情思浩無涯徙倚東窗日未斜乍雨乍晴鶯唤栁不寒不暖蝶穿花讀書有味慵拖杖覓句新成自煮茶未必貴遊知此趣乘除合付野人家送葉子春赴官慈溪眼邊英氣鬱嵳峨甫及同堂奈别何正以簿書觀道力且於言動卜天和聖門克己勤登岸後學禔身感逝波三載歸來話新益梅花仍向臘前多和清臣病後韻契濶芝眉兩月中往尋一笑思春融知君近日能尋樂欵我昨宵多發蒙快得聨詩到侯喜何當載酒過揚雄交情須作霜松老莫學翻翻桃李風九日阻雨晚晴二首秋氣重陽故故深臨欄極目一披襟紫茰黃菊常年事冷雨淒風此日心節物將迎人易老塵埃追逐我難任笑驅萬慮歸何有獨自低頭課椘吟年年此日競躋攀今日柴門雨遣關不見白衣人送酒難偕烏帽客登山鴉聲不斫遙天暮鳥影爭廽落照間未識眀年誰健在逢時只合暫開顔夀章參政聲名早已壓人寰手握樞機鬢未斑嘉會宛如魚在水逺猷直放馬歸山風生帷幄深沉處春在邊陲廣莫間聞説吳兒眠正熟月眀夜戶不曾關與二三友逰天慶觀適興相擕步晚涼琳宫因得縱徜徉月翻楊栁盡頭影風擢芙蓉閙處香縱論從來難得友清逰似此喜逢場石欄坐久笑分袂無酒渾疑在醉鄉挽陳知縣為訊華亭鶴唳無琴聲斫處客悲渠日邊消息花爭閙露下光隂栁變踈未嘆子雲新第宅最憐定國舊門閭風簷讀罷間居賦向後何人奉板輿挽王吉父知縣不把升沉挂舌端排空劍氣逼人寒竟鋤卉服功良易及試花封事轉難病骨欲從間裏過長身仍作夢中看醒庵文獻知多少一子雍容尚耐官代挽何知縣二首一第聲名動冕旒淵源家學自梁丘誰知雨化青襟日最解風馳紫塞秋幕府石洪嗟不作河陽潘嶽竟成休鴈行無復雲邉訊愁絶萱堂正白頭才非似舅辱心知露豁襟期喜溢眉縣組秦淮久依託賓筵建鄴又追隨聞君馴雉未多日洎我分魚已後時徒對絃歌誦遺愛西風涕淚強裁詩七言絶句讀商君傳二首荆公詩云自古驅民在信誠一言為重百金輕今人未可非商鞅商鞅能令政必行余謂鞅非誠信者慮民不服設徙木事以劫之真詐偽之尤耳欲政必行自是一病古人之治正其本而已行不行非所計也荆公以新法自負不恤人言患正墮此故余詩反之大信之信本不約至誠之誠乃如神欲識唐虞感通處泊然無物自相親計事應須逺作程快心多釀後災成遁來關下無人舍正為商君法太行詠史沛公家業本無能休責渠曹不治生看取帝王他日事方知俗眼未分眀赤族誠非漢道洪違時賈禍亦緣公最憐老却從陳豨不道先曾闢蒯通代和陳郎中丹桂三首千古陵陽芳桂叢凌風擎出蘃珠宫渥丹自是天然質不學桃花點注紅春蘭愧死菊羞黃世上龍涎不敢香獨有含香人晚步搘笻一笑倚斜陽露沐煙梳冉冉時朗然新月似蛾眉傍人盡向天邉覓不信蟾宫在樹枝和黃臨海詠雪剪水紛紛撲面來須臾灑滿舊瓊臺今年不用箋丹極聞説金穰百室開詞栁初新咏栁東郊向曉星杓亞報帝里春來也栁擡煙眼花勻露臉漸覺緑嬌紅姹粧點層臺芳榭運神功丹青無價别有堯階試罷新郎君成行如畫杏園風細桃花浪暖竟喜羽遷鱗化遍九陌相將逰冶驟香塵寶鞍驕馬三臺令咏芙蓉魚藻池邉射鴨芙蓉苑裏看花月色赭黃相似不著紅鸞扇遮池北池南水緑殿前殿後花紅天子千秋萬歲未央眀月清風鷓鴣天南教場賞芙蓉莫惜花前泥酒壺沙場千步錦平鋪將軍間試臨邉手按出吳宫小陳圗清露裏曉霜餘嬌紅淡白更憐渠人間落木蕭蕭下獨倚秋江畫不如再賦艷朵珍叢間舞衣蹴毬場外打紅圍小輿穿入花深處且住簮花醉一巵秋欲盡最憐伊江梅未破菊離披情知不與韶華競回首西風怨阿誰
