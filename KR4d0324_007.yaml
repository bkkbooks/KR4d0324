body:
  text: 篔忩集巻七宋陳耆卿撰䇿問問公議國之元氣也天下之事當與天下人共之謂可言者止於公卿大夫私也止于士亦私也故古之世不獨士傳言也而工瞽有諫焉庶人有謗焉商旅有議焉此世之盛也而孔子乃曰天下有道則庶人不議然則古之議非歟夫議有兩端顯白是非冀以轉聞而藥時病者議也潛摘可否藉以排擊而快已私者亦議也中古以降庶人盖不議矣不議者非不能議不敢議也豈惟庶人不敢士亦莫之敢矣雖然庶人不敢議猶可言也士不敢議不可言也士者公卿大夫之階也士不敢議則等而上之豈獨士哉漢集議古意也然亦下至博士議郎而止未嘗及士至於鹽鐵一事發言盈庭而卒定於賢良文學之口此非可為漢家賀者歟夫為士者不自鄙其卑而能盡言以屈公卿為公卿者不自抗其尊而能虛懐以屈于士是誠可賀也論者則曰朝廷之事決於公卿則順決於士則逆是則何異坎蛙之見而亦豈識古聖賢公天下之慮哉國家養士以太學非徒養其文也亦所以養其氣而為公卿大夫之階也其氣直則其言隨之政和宣和之交慶元開禧之際其言不輟其氣不沮雖少晦於雲霾之侵蝕而卒大明於日月之呈露憂治世而危明主其古意邪其亦有所激而然邪夫公議在學校或以為不若在朝廷也然非朝廷之有公議豈能來學校之公議乎然則學校之公議即朝廷之公議也求言如求醫進言如進藥特未知今日之事病果安在而藥當何施學校之言與朝廷之所施行者同邪異邪抑跡若相反而實所以相成邪昔鄭人議於鄉校或欲毁之而子産不可且曰其所善者吾則行之其所惡者吾則改之是吾師也一國猶爾而況於四海之大乎充子産之説則説者益衆所以為吾師者益廣患不言爾不患其多言也諸君其並考古今以對亦欲因諸君之言以占諸君之氣問士莫難於義理之學也義理之學莫㣲於心與性心與性人之所有也而以為㣲何也魯論一編萬理森列而心性之説略焉自言從心而不言心之為何物子貢又謂其言性不可得聞其果然乎否也夫以其稟是理謂之性以其攝是性謂之心心與性非二物也而又非有二道曰正心治心曰率性盡性此皆判而言之也合而言之莫詳於孟子曰盡其心者知其性也又曰存其心養其性夫先盡而後存邪存而後能盡邪先知而後養邪養而後能知邪言心而至於言志言氣言性而至於言情言才竊謂其昭揭端倪抉露關鍵禆性聖而開來學天下萬世莫强焉然曰持其志無暴其氣則是志與氣析為二矣而又曰志壹則動氣氣壹則動志果二邪曰氣配義與道則是氣與義合為一矣而又曰是集義所生果一邪既曰性善而又曰乃若其情則可以為善則是情亦善矣性與情果皆善則何為而有性情之别邪易言利貞性情詩言吟詠情性古人固亦合而言之矣析而言之果昉於何時邪既曰情可為善而又以不善為非才之罪則是才亦善矣情與才果皆善則又何為而有情才之别邪程子言才稟於氣氣有清濁夫氣有清濁則才有善不善矣而孟子顧以不善為非才之罪者何也豈程子之所謂才與孟子之所謂才名似而實不同歟夫義理無窮知識有限悠悠千載先覺者幾人哉志氣情才之説不明則於心性之學亦必有差之絲忽而失之丘山者願相與評之問天下之理至於中而止自昔聖賢轉相授受以標的萬世非不能運竒於常智之外而終不敢也盖以釐黍之過即尋丈之誤異端曲學初亦學聖人而其終每每氷炭者未必皆不及之弊亦多有過之者爾堯舜禹曰執中所謂精一者執之之方也湯亦執中而不曰精一湯果何道以執之邪至於箕子則不言中而言極至於孔子則既言中而又言庸至於子思則既言中庸又言中和極與中固無異㫖言中而又言庸者豈以中之一字為未盡而必繼之以庸邪言中庸而又言中和者豈以庸之一字為未備而必易之以和邪或曰以義理言之則曰中庸以性情言之則曰中和果若是則天下之義理安有出於性情之外者而必易庸為和何也既而言君子時中則非惟不言和且不言庸矣豈中足以該庸庸不足以該中邪時之一字最善名狀天地聖人同此而已知執之說而不知時之義則有非所當執而執者是故有以用鯀為中有以殛之而為中有以封管蔡為中有以誅之而為中此時也知所謂時則雖有不盡執者而亦無害其為善執矣不然則子莫執中宜足以上繼堯舜禹而孟子非之得非同其執而不同其所以執邪洪惟皇上聰明慈儉淵懿沖黙凡所以根諸宮庭枝葉諸海㝢者固未嘗有過不及之處屬者建議之臣恭耳聖訓而竊窺聖心深以為有得於精一之傳執兩端而用中之㫖至論今日治效之未古則終歸於力行之論盖中者理也力行者誠也固嘗反覆子思之書實綱領於誠之一字夫自形則著衍而達之明動變化之詳自不息則久充而極之悠久博厚髙明之盛皆力行之功用也故論其極可與天地參而何治效之足云哉然則吾皇之心非短於誠也而廷臣猶以為獻其過計邪抑所以運量而恢廣之者宜有良藥邪諸君其併考堯舜禹以來執中之説擇其切者以對且言今日力行其何所從始有司將别白以聞焉問仁何物也孔子罕言之得不以其逺且大故歟然以其逺且大而罕言之無傷也天下之人則曰彼聖人猶不言仁吾可以不言仁矣舉天下不言仁仁之道不已晦乎嘗論仁之道猶元氣元氣之運生生職職萬物同此鑪錘也信若是則孔子之答仁奚其異夫異於諸子猶可言也樊遲一人而三問則三其對仁其若是煩碎乎然此皆告之以仁之方也許以仁則未也問仲弓則曰不知其仁問由求赤則曰不知其仁問子文文子則曰未知焉得仁同耶異耶許顔子以三月不違是三月之外猶有違時也是未實以仁許顔子也而至管仲則曰如其仁如其仁不以許顔而以許仲何耶謂管仲以功則是以成敗論人而未必孔子之意也孔子未嘗言仁之所以為仁也至孟子乃詳言之曰仁人心曰尊爵曰安宅所以狀仁者惟恐其不白是則與孔子異趣豈其樂言乎孔子之所不言歟抑孔子之所未言而正望孟子發之歟不特此也孔子罕言仁而孟子兼言義孔子顧不能言義耶謂仁義一途則孟子又何言仁義耶夫立人之道曰仁與義仁義者學之宗也不言仁義則何以學願聞其説説竹居説瑞安趙正父植竹其舍命曰竹居居者君之所寄也竹者君之所以寄所寄也人莫不有所寄至寄於竹則寄之清者也或曰人非竹則不清乎曰不然竹之清外也人内也以内合外則清無其内而强附其外則濁郊原堤塹間竹常滿眼豈獨君能植竹哉然而左棘右葦雀叢鳥聚而埃壒常盈盈焉若是者居雖竹人不竹也君宗室子擢第二十二年卑縮如寒士悲吟喜詠如琅玕磨戛而琴瑟搏拊也其清似矣而曰吾邑漁鹽之藪人相鬨成市予故借竹而逃焉噫斯其可逃也邪豈惟不可逃亦不必逃也以君之胷次已無待乎竹之清而豈其漁鹽所能濁哉然則以竹自名寄所寄也以内合外者也余懼覽者不察故為之説俾刻之柱間蔣上甫字説吾友蔣君易其名曰滏問滏之義曰其字從水日者謂吾命不足於水故借此以足之也余曰嘻異哉子之名三易矣今可以己夫抑余不知子之有取於水者其止如日者之言歟抑亦取夫水之德以自命歟如前之説吾不聞請為子申後之説夫水起於天一之毫芒而能注大海而不溢其為體則清而靜夫固有時而濁且動矣清而靜者常在也嘗試反諸一真未破之初無盡水也自夫賊之而不養則漂山決石無所徃而不為害夫水非害人者也自害者害之也能順其初則不為害而利焉水由地中行舜由仁義行地不與水期而水與地合舜不與仁義期而仁義與舜合充是術也無所徃而不相似也然則水盖在子之身而不在命也昧於裏而騖於表可哉吾聞古之言水者莫若老子盖以上善譬之今以上甫配子名賊而不養斯為下矣吾上甫懋戒哉題䟦題陳工部謝寺丞送魯君逺遊詩後魯君秉禮氣豪窮刺骨每毎以其髙堂菽水厪肉食者之憂觀陳謝二公相與推㧞振業之意爛盈篇什末後一轉語咸知其有母在也今母死無以葬又將浮淮泛浙指好義者以為歸夫以親累人孝子也以人之親為己累賢大夫也彼囘環征塗叩人户不厭止於身之困妻子之迫人猶哀之如君者其有極邪然則哀其親於生孰與哀其親於死持是以吿今之君子謂使二公專美吾不信也陳耆卿題又題思濟兄詩軸從事叔祖以文章道德伏一鄉咳唾落紙人寶之踰連城璧自恨生晚不克請三昧猶記童時吾父挾以見摩頭謂曰寥寥吾族汝勉哉耆卿書紳不敢忘叔祖殁父且即世小子益無以嗣誦遺言面熱環顧城南族譜誰共奮哉叔祖一子死布衣有孫三人長字思濟余兄也每來自金鼇必相訪相勞苦余感且嘆而未及一見其文余心慊焉暇日至止言曰吾欲觀弟近作何如吾亦有一編今藉手出諸袖中光采陸離奪目再拜效白圭之復見其紙有盡而波瀾無窮然且穿穴理道意態横發宛然叔祖不死也人情狎晦而驚昭見兄狀貌不踰中人而語言若不出諸口則遂以為庸人者有之矣孰識其胷中之浩浩者然也夫不弛不張不抑不揚世而無君子也則已世而有君子也吾兄其庶幾乎耆卿賀叔祖之有孫而自賀其有兄於是乎書又題葉子春詩昔人云語不驚人死不休驚人語未易道也子春文不注思但自襟府流出其飄拔處如空中火雲如平坡上孤峯屹立使句句皆然人驚且走矣昔人又曰新詩如彈丸夫彈丸者非以其圓且熟邪文有根有條有葩有實釀而後發瀦而後決久之則縱筆所鄉圓且熟莫加焉盖不求驚人而人自驚此古人之要訣也前年冬子春請余題其畫不果今題其詩代䟦錢君韻補龜圖鳥跡漆書石鼓其狀幽眇譎竒人所罕見亦人所難通也乃若目於斯耳於斯習其畫而迷其讀非陋歟韓退之云凡為文辭當多識古字夫多識古字未足為文也然不識則無以為文今六經之字豈必盡古學者例以監韻為師監韻所不載不之味也溪南錢君味乎世之所不味旁羅周抉根括蔓引足以鳩棼紉闕與前人分功甚矣其志完而力富也其老猶爾而況其壯之日哉余與君别三年吏氛壓首覽巻心目為開頗恨路逺不能效漢人載酒之問而徜徉其問也又題雪巢贈林逢吉詩雪巢詩芬薌一世其故舊老蒼如尤尚書延之沈侍郎虞卿楊待制廷秀洎一時名勝皆拱手側足立門庭可謂髙矣晚友逢吉顧莫逆驩甚前修肝膽相投氷泮水落豈論夫輩行之先後年齡之稚壯哉余曩觀逢吉詩如柳逗午風花肥春雨使人依依不舍今讀此老所贈句知根蒂有自來矣因閱諸公䟦語隨喜讚歎陳耆卿題行狀蕭仲實行狀君諱仁傑字仲實其先四明人曽祖克誠客游臨海誅茅巾子山之下懐璞以死祖機繼之父浩廸功郎曠逺有塵外趣經乾道火益拓落不事事日飲亡何自命曰吾與其蓬首治田與廬寜婆娑以待吾子焉盖謂君也君蚤有大志欲以儒書壯門户漁獵今古窮日夜不厭學毛鄭詩後從鄉先生李民載學易時李館於侍郎吳公芾之門户履充滿君一詣輒脱穎出吳駭且歎口矻矻道其文其文明白造理不為枝蔓洎乎遊鄉校課試常躐異等郡博士累累器重之領袖諸生進止不失尺寸願摳衣者相望請問退如客得歸貧而勇於學者君亦嘉與封殖不底於成不止以故人人爭自奮礱刮矯揉懼弗稱貽君羞卒業成名為賢大夫士者聨翩出焉中年不得志場屋寄家政細君而自佚於書口不掛人物否臧時事可否案上爐煙一縷圗史簇簇如新竹風蕉雨顧影自答客至則講畫義理纚纚若河傾川決或漏下三鼓僮僕低迷思寢視君肩筆立無欹斜衆歎不能君處之安然嵗晚悟死生嘗曰人命如槿花不腐者惟吾此心爾暇則按禮經紉深衣一襲曰此所以周吾身也尋屬疾廼豫戒棺歛旦起盥頮如常時意若有所吐氣暴絶亟蘇命諸子遷於正寢詔之曰吾命直盡謹毋號泣亂我乃卒嘉定辛未七月朔日也享年六十七君七嵗喪母事後母逾謹毎讀書一語及親則聲淚俱下人以為有顧景怡之風焉弟若妹雖異出相煦甚恩必誠必莊終其身不識詼笑狎侮少負氣犖犖出肝膽赴人急浮觴舉白瞪視八極類古所謂豪士者已乃摧去牙角如羞如藏久之趣益平德益進行虛步獨毛髮中繩而不鬻已要名人之即之惟見其和氣津津可挹而不知其有難干者易曰履道坦坦幽人貞吉其君之謂歟君之配鄭氏子秀穎秀發以其卒之明年臘月甲申窆於太平鄉梅浦之原距祖塋可十步以行述求諗君耆卿之先友也先君子無恙時君徃還吾家先君子必語耆卿曰是公言有典型汝其識之不幸而先君子沒沒五六年乃與君為婚姻又十年君乃下世後一年秀穎秀發且從予游於其請敢卒辭乎君教子有本末嘗曰華而偷不若質而厚也諸子皆恂恂力學庶幾不負君者爰摭其父事大較書以遺之俾告於立言君子謹狀文林郎樂清縣丞吳君行狀代君諱貫林字元用世家常之宜興曽大父襄大父沖皆晦弗耀父開有文行刻意教子捐貲為師友費家用是貧君方少時强記而篤學閉户一榻家人罕識其面夜誦之聲撼動四壁鄉先生沈公文見而竒之授以關鑰日涵月漬遂以文聲一鄉君家富徃徃寘身仕版否亦登天府籍帝學君早薦於鄉氣鋭力强謂可躐取科第卒不利該免解試南宮亦不利就乙未恩科三十年間無幾㣲見於顔面其過人已逺矣調廸功郎厯台明二州户部贍軍酒庫在明時酤令急人人自危君帥同僚訴諸郡曰公知㩁酒之利未知擾民之害朝家委公字民意不在酒也聞者謂君言過當君不以為忌守亦不怒卒弛禁時人兩髙之轉温州樂清縣丞職素聞君談笑有餘地郡牒移委剖決盡公縣吏有恣為姦利而稂莠一邑者聲毒乳虎長官懦莫敢誰何君曰是可忍邪特詣郡言狀而流之百里驩呼咸謂有孟賁之勇焉盖君才不盡施時出一二已如此終考脱簪竟歸或勸請諸朝乞休致秩服以華其老輒拒不應其家枕東湖有風月藻柳之適春夏交游子憧憧如織望君睨然坐於堂孤哦獨酌藐若無所聞不知者以為忘世而君不顧也意有所觸時發於詩閑澹舒平得晉宋風格如是者幾十年視聽步履不衰食生飲寒人曰真夀考者耶尋得腹疾謝醫以嘉定癸亥重九日卒年八十治命不用浮屠法娶茅氏二子宗尹宗堯二女長許嫁進士陳某孫男女六人君之性老不廢書窮不茍禄簡交而親仁寡言而心有尺度率其志以行至老且死視世毁譽愠喜如蚊䖟然嗚呼賢矣君以淳熙八年官於台已而樂其風土家焉後三年而茅氏卒葬於城東雙井之側距所居無二里君卒次年宗尹等乃以九月庚申祔且泣告於昌言曰台實異鄉罕有能知父者子契且鄰而又適官於斯不自揆願有述焉昌言自念别君十年音塵曠絶朅來訪舊已隔死生非文字無以紓吾哀抆淚落筆抑重有愧云謹狀
