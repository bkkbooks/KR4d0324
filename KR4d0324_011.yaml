body:
  text: 跋為文大要有三主之以理張之以氣束之以法篔窗先生探周程之旨趣貫歐曾之脈絡非徒工於文者也余將指淮東欲盡出先生文以啓來者甫命工以他役去乃屬海陵謝令範錧鋟初集三十卷蓋先生四十歲以前之作也雄竒徑正己如此後此者為續集理研之而益精氣培之而益厚法操之而益嚴惜未及并鑱之尚俟他日云淳祐癸卯上元日荆溪吳子良謹題
