body:
  text: 䟦為文大要有三主之以理張之以氣束之以法篔窓先生探周程之㫖趣貫歐曾之脉絡非徒工於文者也余将指淮東欲盡出先生文以啟来者甫命工以他役去乃属海陵謝令範錧鋟初集三十巻盖先生四十歳以前之作也雄竒勁正己如此後此者為續集理研之而益精氣培之而益厚法操之而益嚴惜未及并鑱之尚俟他日云淳祐癸卯上元日荆溪吴子良謹題
