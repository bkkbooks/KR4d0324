body:
  text: 篔窗集卷八宋陳耆卿撰墓志銘朝散郎祕書丞錢公撫墓志銘公吳越錢氏諱撫字子立曽祖皥提舉河東路常平贈太中大夫祖諷博古隱山中鄉人所謂回溪先生者也父斆游太學不第贈奉議郎錢氏自武肅王而下距太中五世太中宦西北始去錢塘寓洛更南渡去洛寓嘉禾嘉禾之錢百年矣公生回溪尚亡恙見其眉宇聳異謂奉議曰亢吾宗者此兒乎未幾奉議亡母陳夫人誓不更嫁長泣曰妾賴天未死儻弗教吾兒死無以見吾夫也公泣曰兒儻弗受教死無以見吾父也後卒入太學登丙辰進士科調仙居縣簿尉用薦者三人升從政郎教授饒州轉儒林郎用薦者五人改通直郎知太平縣磨勘轉奉議郎用薦者八人監登聞鼓院遷宗正寺主簿兼宗學諭尋充金國生辰使假工部尚書行勞還轉承議郎遷樞密院編修官磨勘轉朝奉郎兼檢詳遷祕書丞十日卒公政存大體事識先務仙居故陳公襄所治縣祠荒遺文散逸亟白長繕治刋布之間攝事學宮士歡趨言曰自尉來吾鄉夜開户睡矣旦起又循循誘我我何面目負尉饒號多士廩食薄乞增田千斛而後教從之士歡趨益衆以其餘力攝倅事柅姦苴漏過於正官在時常曰吾豈以久暫分勞逸者邪豫之俸不取也太平又孫公莘老所治縣崇敬視古靈縣土埆民貧多豪右有官者之孫子尤呌呼抵突氣力張王官府無如何公鎮以果毅民訟之滯於官者常剖斷無餘官賦之滯於民者常寬假無不足也㑹敵兵息古汴復通好時已罷賀正使則議賀生辰因俾覘敵擇其人咸曰錢某可是以有工書之命公慷慨别妻子辟弟穮與俱陛辭上優勞曰行萬里不易然使事有體屈則國辱且彼非曩時比卿其亷問底裏歸以所見聞告朕公拜而出洎抵北北人見公貌英偉詫曰竒士竒士就館宴酒僞使有姓完顔者名故犯濮邸諱及是自易以避公公間見敵調法紛紛知盟好必敗乃鈎引他故撼庀事者庀事者具言狀且曰嵗幣安在吾國將留使者而問焉聞之乎公曰吾知奉命來聘爾他非使臣之所得聞也即若是吾請以死對敵知公不可奪議遂寢回次都梁敵兵踐淮甸矣對便殿言臣將命無狀幸身脫歸見日月因言臣將為陛下畫自强之䇿何謂自强之䇿曰以制使總萬里權當重不重則不威以邊守治一州任當久不久則不服軍食當增偫不偫則不給土兵當廣募不募則不繼城築審其當緩急師屯審其當聚分將士惰當誅卒伍勞當賞忠義人當奬民當收凡此皆自强之䇿也夫自强者制人自弱者制於人不亟改圗而或以敵盛衰為候敵去則偃腹來則搏手非計也臣誠愚不足禆廟謨惟陛下裁察再嵗兩輪對首言天下有大憂二逺憂兵近憂旱此人所自見也而口常諱言將帥言勝不言負守令言熟不言歉臣恐雷同波靡浸成壅隔宜風示臺閫摘其尤者坐之罪又言汰邊兵以省國費補內兵以强國勢方其時邉報正急羽書四面至公左右樞管辛瘁忘寢食病彊起視事遷中祕欲乞外病遂不愈年止五十二詔賻錢百萬轉朝散郎公器宇粹凝局量夷厚中有好惡外無愠喜接物露誠欵御下寬瑕疵蓋用心主於仁而行事合於義家居嘗欲峙髙廩振宗黨乏絶至居官茍可嘉惠百姓勇往疾馳風雨不避也於文無所不學亦無所不工玉縝珠輝霞敷綺㑹敏而緻麗而則而尤長於四六半函片簡字字雋穎使人口之不置手之不釋也其略如是娶姚氏莊氏王氏贈封皆安人子曰源女嫁進士俞梓今沿海制置建之子也公死於嘉定己卯五月二十三日源以其年十一月十日葬湖州武康縣龍塢既窆來速銘余觀治世人材其顯融有四曰操行曰器識曰政業曰文華此四者功名之券富貴之的也一有之固難衆具之尤不易矣若公者文華拙歟政業疏歟器識褊歟操行薄歟衆具之而尤不顯融吾不知其何說也蓋公之未用也人莫不以為賢其用也人莫不以為稱其不大用而死也人莫不以為不幸是宜銘銘曰扶忠信之華轂兮駕貞潔之飛艎攬清風以為衣兮襲明月而為裳髮五十而未白兮刷余羽於周行歌皇華之五闋兮履穹廬而康莊儼閬風之雲立兮足未闖而身殃謂松柏之合短夭兮夫何異於春楊嗚呼天不可訊兮地不可量挹君袂而不返兮何時歸乎故鄉黃君墓志銘麗水有賢令曰黃君沐之未滿嵗死死滿嵗其子傳奉監州詹公乂民之命自長溪來速銘君賢宜銘也能使上官思其賢經紀之振耀之愈宜銘也君字澤民唐昭宗時有校書郎名璞者著書號霧居子生詵自詵至允章三世咸有祿位五世至大中封迪功郎大中子十萬封承奉郎十萬子楫中第不覔舉以通直郎老於家君其仲子也君讀書務通大意耻為章句師既冠薦第三明年奏名調義烏尉邑多土豪與鼠輩相出沒見君尚少年薄易之君與其屬約曰必勦是吾始貰汝賊有鐵彈子者負險格敵君躬搗其穴縛以歸自是義烏不苦盜州嵗歉檄君核視君語其輔行者曰吾敢忤太守邪然不忤太守則忤民矣民不可忤也幕府疑其釣名君爭之卒減賦十六七常平使者又檄君賑濟已而出不意行部見在在積粟不類歉嵗深駭異之故事尉巡行必使里正饋食每觴客胥卒供煩費旋以追逮文移暗酬其直君謂此假手受賕寧餓死不敢太守聞為增俸去之日不持一錢以歸尋令上杭嚴吏而寬民緩財而不留獄雖休浣若暮夜亦許投牒即理未可賁育莫奪也大家鄭其姓者持邑事短長連齧數令君疏之郡論如律縣至鬻鹽運丁稍失期則上供負殿君通融有術課倍登改秩知麗水大較如上杭胥吏弄財賦不問輸未輸混為一籍賄至籍立改以上户産移下户下户寃不堪命君搜獵見底裏重置吏於法賦始平方將脉縷源流爬梳隱瘼立程式以惠來者意懇懇特甚豫嘗行其野民誦君一舌洎入謁見君竟日据案問有暇乎曰無能彊飯乎曰不能也嗚呼豫因疑君甚矣視其貌則魁而腴竟不數月死矣家人問所欲言曰善教吾子乃瞑年四十四娶徽州判官楊及申女子長傳次觀豫每慨才與志人所難也而兼之者尤難兼之而發早者倍難也如君兼之而發且早矣矢激石裂雲飛川達可以至而不至命邪發之早者固不若晚而成邪然則彼有無才與志而淟汩以夀偃蹇以貴名謂之成而實則非也君兄名清之少相磨以學凡同學諸老生咸謂君久且大君仕竟夭兄未官扶通直哭失聲無幾何通直亦死家事惟清之凡豫所掇拾以銘君者清之筆也詹公拊傳首曰汝無父有伯父爾其事伯父如父嗚呼世有上官之賢憫其寮之死而眷眷其家若此哉君死以嘉定十二年三月某日葬以其次年某月某日墓在某鄉銘曰鸞停鶴矯森羽翰跬視層雲莽無邊逆風吹汝縶弗騫豈獨汝泣人共憐自古有死誰百年夀跖不博夭回賢嗟哉澤民卧幽阡光氣不沒珠藏淵童府君墓志銘去台城可四十里其地曰七孺丘谷逶迤民土著而重犯中有隱君子焉童姓而棐名以德行表其鄉足不識官府雪顛渥頰得其正以歿蓋豫祖妣之愛弟也祖妣之歸陳氏不二年而哭其雙親嵗時往來惟君最昵嘗指以語吾先君曰我在其團欒者惟弟我亡汝善事之豫總角聞此語今三十年矣祖妣既謝先君亦棄其孤君巋然獨存豫感昔輒泣涕嗟乎君又死且葬矣尚忍執筆學為此銘哉君之曽祖曰有方生衮衮生百材嘗名其堂曰琢玉羅明師聚子姪而誨之君沉酣其間思有以自拔既試歸不售浩然得龎德公之趣栽花蒔竹水流其門客至棋酒徜佯竟日忘去間謂所親曰吾得臭味相如足矣利交能幾何以故兄弟議析財有遜無校里以緩急告解衣推食盡歡凶年計當食之粟而儲之餘率以貸曰吾非獨飽者也蓋君性沉厚語呐呐不出口而所趨乃爾信所謂質直而好義者邪夫人陳氏太和丞綰之女兄齊眉倡隨之死弗忒君之善得行於鄉者夫人之助為多夫人卒於慶元五年六月壬申年七十六後十四年當嘉定四年七月戊午君卒年八十二六年十一月丙申合葬南溪子曰偉曰仰壻曰陳偲孫男女六人君之長子孝友而知學勇修其父之業而潤澤過人嵗在甲子試於州歸而屬疾以重九日不起時君尚無恙衆環泣曰天不使人種德邪如君之用力之勤幸見此子而不幸哭此子也偉之葬且同日仰帥其猶子負土甚哀聞者尤哀之銘曰厥初生民其道如砥逮德下衰營營以死吁嗟若人淡弗干名有濯其蘭過者曰馨父父子子夫夫婦婦豈偶然邪胡為乎兹程伯修墓志銘程姓起周司馬喬伯至本朝蓋大自河南先生以道倡支派星析有家遂寧之長舉者伯修其一也伯修之曽祖曰極卒官承奉郎承奉生綿州司户潛司户生處士仲任伯修諱立誠處士之中子七嵗能詩比壯遇李若無於眉山棄其學而學焉若無隱者也居有頃親朋誚讓謂伯修年盛有母不能媒斗祿非孝伯修幡然起試於有司九嵗凡三薦文聲涌出將屢試喪母泣幾喪明服除再入眉山辭其所往來者曰昔之出以為親也親亡吾從此逝矣獨喜蓄善藥手自櫛爬赴人急不避寒暑深山窮谷望如盧扁再生即意所可雖樵夫與抗禮即不可雖貴盛戒門以絶或曰伯修喬亢人也或曰伯修遁世而不障物卷道弗售泄其土苴於醫惡茍合爾伯修既無求於俗俗亦罕知伯修及病且革更作歌怡然而逝年八十三矣嘉定七年十二月丙子葬雲巖是嵗之夏其族弟叔光㑹京師道其顛末惟悉且請銘夫余固亦哭其母者不能如伯修之髙蹈日索長安米可愧也哉銘曰出也匪舒遁也匪拘維君維親同乎厥初雲巖之雲或暵或雨之人已矣令聞不死蔣知縣夫人墓志銘故知象山縣蔣公鶚之夫人郭氏台臨海巨姓父諱筠母趙以濮安懿王孫之女法得任其夫終修武郎夫人生紈繻中淑莊罕袨飾修武曰吾不能隨族黨湛浮歸富人必以子名士家其蔣考叔乎或謝曰貧修武曰考叔其長貧者邪卒豫象山考叔象山字也象山胸有萬卷書頡頏今古語脫口膾炙傾一州當世賢公卿競禮下之豈特為名士自辛巳授室癸未入太學己丑登進士科已而仕于婺于明夫人與之俱齧苦吞辛無絲粟見顔色象山自喜晚得婦既滿還里舍病作數月卒先是仲子死一年矣長子後兩月亦死夫人忍淚自力如象山在時既而館壻于庭教孫于孰詔之曰梱以外惟女主之未亡人風露無多彊活爾自是坐不改榻行不跨户不詈不朴不笑語而事事繩墨如手自爬搔然蓋外沖夷中髙明雖油然可親亦隱然不可侮非若世上女子嚴則鷙暴寬則魚潰也是之謂正性常德襲休祥而胚夀嘏之道豈偶然者哉嘉定十一年九月十七日微疾卒年八十四子曰復曰永壻沈拱趙師嚻師嚻監績溪縣稅偕其室亡矣孫武仲曽孫森嚞轟女二人夫人之孫余之姑之夫也衰且絰將以十三年十一月初十日祔于大田告之曰夫人一生莫重于道德而千金為輕莫貴于仁義而三事為賤士之所自厚在此不在彼也烏得以一命服之有無而長短夫人哉然則彼有鸞書雲疉象服星爛俗駭而羡之者其於夫人賢不肖何如也銘曰簷鵲兮朝朝梁燕兮宵宵乃如之人兮誰與逍遙氷為佩兮雪為鑣盡我日月兮淒其回颷從夫子於下地兮山愁水號祝夫人壙志代季父君祝姓台之臨海人曽祖寧祖穎父興宗皆婆娑丘園無顯者君在童年以柔靖愛于父母入于門不逮事舅獨喜有姑在蚤莫迎順不以一髮傷其懷衆謂陳氏有婦矣豫家故貧惟以詩書自命君臭味實協唱隨無間言性仁且怡不為窘聲躁也閫內事咸有條理此族姻親見也蚤嵗疾客於脾醫不治轉劇蒼顔白髮見于盛年卒以是困且死死之日為嘉定己巳二月庚午子良卿成卿夀卿女長適蔡端本次字包輝未行豫聞生而多艱者必夀此乘除法也于豫室獨不然哀哉豫日薄西山婚嫁事如逋之積念君在時雖十日九病猶能商確焉今亡尚疇依乎此又豫所自哀者也陳氏世葬縣之義城鄉戲龍山山之南可以附卜乃以十二月庚申舉其柩藏焉辛岡巽水覆土植松妯娌若魚貫然而距郡城可十里嗚呼泉可移石可隳後千年有人尚克念之潁川陳某志祭文祭商羲仲郎中文嗚呼夭夀死生得失窮通不繫巧愚繫其所逢貴榮賤枯崇泰黜否細人之私君子反是君之筆舌一瀉三江古木倒影中涵宮商文字之官鳳池鑾殿君不翺翔秪落州縣乃其政事有介有通有雨有暘有雷有風晚鎮于西趣尚平易收斂鋒鋩率真袪僞而或謂君違俗背時不能俯仰揚波啜醨其進也徐其退也亟衆妬蛾眉變亂白黑歸卧於室見者慮焉誰知其病芽蘖有年蹇吃語言趦趄步履使其未瘳猶愈於死人不可恃所恃者天天復揠之何辜而然嗟世之愚顛迷昏晝簡默為險剛方為傲猶有公論如日照衢浮雲去來不礙太虗頗聞去思聲滿檇李彼蚩者氓亦有臧否風恬浪靜豈無還期櫝此一棺已而已而鄴侯之籖子雲之宅清夜如氷其人何若三商不作今失典刑吾鄉之思匪徒友朋祭祝縣尉文嗚呼君官于南我家于北未及握手論心已熟六月徂暑訪我篔窗劇談過午清風一牀我亦疑君老態先白扶出户限幾不能屐君曰自愛秋當復來時我解組一笑歸哉旦旦望君而君不至問何以然曰既長逝嗚呼聚散離合如機之旋以正而終一息百年我不悲君憐其有母霜雪九旬而更哭子迢迢故鄉君魂疇依寄聲江水恨不奮飛代叔祭蔡基仲夫婦文哀哉基仲竟止此耶人孰不死子何酷耶子以孑然遺孤尸一門嗣續之寄家之興亡惟子是視而幼克自立以至於成人既勞厥生且勉於學可以為子矣吾女歸子樂其臭味之相茹也蓋與子共苦食淡者七年而不敢怨可以為婦矣是豈獨汝家之幸亦我家之幸也吾女歸告我曰我不能終事厥母願有以事父自是而後凡吾家微末之事惟吾女之問子亦朝暮往來一杯相屬好洽如家人也嗚呼吾今六十有四矣齒髮搖白來日幾何兒女之託亦惟子夫婦之望何辜於天乃使其相繼以沒地也同時屬疾吾以為常事耳越數日而弗瘳又數日而浸劇子卒以是死而吾女則生吾意其猶足以拊子之嬰兒而俟其長也不十日又以訃聞人邪天邪嗟子夫婦受難受之艱辛而得所不當得之凶禍游魂悽悽今也何在其升騰飄忽而歸於天乎其泬寥澌盡而流為泉乎其與化俱往而入於無有乎其怨憤凝結而猶在世乎吾不可得而知也所最痛者㷀㷀稚子娟娟弱女生事滿前誰為之主在生無伸眉之日死未有歸骨之所此雖行道之人猶為齎咨而況於內外姻黨之間哉吾自哭汝以來生意幾落兀兀飲食常如醉夢既為汝悲亦以自傷其不幸而壯者其難保若此衰墜者可望其長久邪一慟之餘雲悽月惻言不能文姑叙以臆嗚呼哀哉五世祖墓祭文維江南鍾岡阜之秀陳之先域實根幹焉往嵗鄰孽宣驕水齧其趾爐香之奠十步九跌者屢矣是子孫之罪也一二年來始克披竹斬藋稍還隴隧五世之嗣亦得以天子命服拜焉夫科名祿仕非以賁其先也仁義道德所以燾其後也如鏡印形如谷答聲其綿聨接續勢之常爾而豈有他哉百年之間冥漠久矣而神靈固不昧也百年之後松楸茂欎毋或不淑為山靈之辱祭先妣文維嘉定三年嵗次庚午五月戊子朔十有八日乙巳耆卿謹以家饌致于亡母孺人姚氏之靈嗚呼吾母其真死邪蓋棺七日無容無聲吾母其真死矣吾家世儒薄生理母歸田無三十畝老屋數間不任風雨吾母一力經紀之左手嬰孩右手績織下至米鹽靡密之事亦牽頓忘食蓋吾先人性耽書口不道家有無其所以至今僅給則實惟母力姻黨盡能言之也丁巳秋先人即世母寡居於時女兄年已及笄長妹亦駸駸次則病瘖其季猶少也藐然一子則又病濵於死過者見之知其百無以堪吾母含淚摩娑卒得活我且漸謀婚嫁事中間多故又有莫之勝說者吾母雅無病苦自是亦抱氣疾二年而不平人曰男女債未償而然母亦曰誠然也經之營之亦盡出母心力其後二壻拜於堂上婦亦入門人謂可以漸間然勞猶昔也嗚呼吾尚忍言之邪自惟不孝無以榮其親然有區區烏烏之情不能志去私謂生茍不達儻得與母蔬飯而嬉少酬其平昔之勞則志願畢矣雖母之所以自期者亦然也嗚呼吾母孰謂其至是邪天不佑善邪豈造物者以子不孝而降此毒戾邪抑母所以役其神者過而脆弱之質自不能久於世邪繼自今吾疇依邪家道誰治邪手澤滿前種種皆血吾亦何以生為邪未病之四旬得孫津津甚喜中夜隆寒起視之至再三焉告母少休勿聽也嗚呼繼自今孫雖啼號吾母其聞之邪惟我母子相與為命三十有一年子不敢一日捨母而逺遊母不肯一日不見子而食母病八月吾八月在牀亦謂母勿藥而康庸詎知辰出暮歸則母已不能語也邪嗚呼痛哉未病時意嘗不滿間或指瘖者曰汝有分則先我死也或又指其季曰吾安得亟嫁汝也或謂母年未六十何介介若此由今觀之似若知其死而然嗚呼痛哉深惟此責母在在母母死在子誓當拊字裝遣如母未瞑目之時母可無憾其所以為母憾者有終身之勞而無一息之樂治家有竒男子之所不能而不及享庸婦之夀如永夜入荆棘遲天明而坦途則車軸折矣此耆卿之所以寃天呌地欲與母俱死而未可也決九河不足以為吾之淚汗千竹不足以書吾之恨哀哀我母今安適矣皇天后土忍於是矣藉使不死無見母之日矣一酹而號肝腸縷絶嗚呼痛哉祭妹文嗚呼兄弟之愛如四體之於身爾其死矣吾何愛其生先子早世兄弟孤惸爾年最幼尤鍾愛於母兄棲遲窮居十有餘年惡衣糲食同茹艱辛兄既得仕爾德修明學禮與詩習以蘩蘋後又十年爾乃從人事夫柔嘉琴瑟鏘鳴生雖孔艱克配賢仁孰謂不遐福祉臻臻聞爾訃音哀不勝情哭不慿棺不見容聲酹酒以文尚感精神死生永訣長想無因嗚呼哀哉
