body:
  text: 篔窗集卷二宋陳耆卿撰論下酈食其論論天下之事易識天下之勢難陳留敖倉地要粟多蓋漢初緊切之處不先據此則本散而易潰酈食其力為帝言之就二者論則陳留為小而敖倉為大入陳留所以謀秦據敖倉所以謀楚秦易破故陳留之入不旋踵而至霸上楚難搖故敖倉之守必至於屢嵗而不決焉然當是時楚兵甚強漢勢尚弱漢之得以制楚而楚之猶有所忌於漢者敖倉之力也不然則楚固得以氣喝力恐直搗其虛矣其後彭城之敗韓信既收兵來會則亟築甬道屬河以取敖倉粟成皋之挑戰大司馬咎長史欣一自剄則復取成皋軍廣武取敖倉食是知敖倉漢之命一日無敖倉則一日無漢髙帝智不及此食其實有以發之下齊之䇿尤為雄偉其剖判楚漢曲直理亦甚眀宜田廣之俯首順聽然不免使韓信之襲齊而至於受烹者眀於謀漢暗於謀已也夫信於是時虜魏豹下趙代斬陳餘降燕王威靈所加易於破竹所未下者獨齊爾蓋以其國大勢強謹之重之而未容輕發也食其一旦以片語下之已之所躊躇而不足者人乃神速而有餘則信亦無以取重於漢雖欲不襲齊蓋不可得食其亦惟知己之辨可以折齊而不知信之詐足以賣已是以就烹嗚呼先下齊者食其也後襲齊者信也使食其之言未入則齊之備固未懈而信之兵固未可向發蹤指示者烹而因人成事者王事之有幸不幸如此哉然則食其固可念而信亦可恥甚矣陳平周勃王陵論誅諸吕事是王陵者非平勃是平勃者復非王陵要皆一偏之見大凡人才固要相濟髙帝遺命必欲以平助陵而又以平制勃則平勃之不可無陵猶陵之不可無平勃也夫明大義當有正論定大難當有沉幾諸吕之王髙后未敢専決而以問三子其心猶有所忌也使三子者括囊隂拱無一語略攻其非則是吕后忌三子而三子乃以無可忌示之一決藩籬封王者豈特四人而已故陵奮不顧身以爭之髙皇帝之神靈皎如天日而吕后則竊者之夜行爾陵死不恨奪之相何足道哉然陵之術可用於陵而不可盡用於平勃夫樊噲之憾吕嬃之譛吕氏磨牙於平勃久矣特未有以發爾若又效王陵之爭則以舊郤雜新忿寧免於誅縱不顯於此事誅豈不能旁托他故以誅之邪夫二子誅不辭也為漢惜也或謂舉事計是非不計成敗使王陵以死爭平勃復以死爭吕氏一日尸三子於朝三子雖死而大義固已立天下之義士將四面並起而亡吕氏矣不知夫能死非難處死實難三子非不能死也顧其時未可爾蓋君子之死有以有益於國而死有以智力已竭無可奈何而死諸吕雖王猶有可圖漢氏雖危猶有可續未畫一計未施一術而俯首以死是適以激變稔禍爾安在其為能死哉借使吕后未誅三子而姑奪之權今日陵謝病免眀日平謝病免又眀日勃謝病免一人去位則以吕氏一人居之回環四顧盡在掌握漢之事去矣且陵爭諸吕之後退處十年自杜門不朝請之外有何巧哉若二子效之又可知矣然則王陵未可非而平勃亦未為不是也平勃雖均為誅諸吕而勃又與平不同平性狡詐故多避禍求全勃性剛直故多犯難不顧文帝錢榖之問平對勃不對王陵背約之問平對勃不對對者未優不對者未劣也蓋平未當難時善於自解有急則委之他人勃未當難時辨不如平有急則自任甚確辨不如平者少文也自任甚確者重厚也故誅諸吕時平嘗安徐勃嘗急迫平不入北軍而勃入北軍使北軍有變則勃先及矣平不諭謁者而勃諭謁者若不受則勃先及矣平専以難者遺勃而自處以易後來相位之遜雖欲不遜亦不可得也勃知已之位在平上者以功大爾豈知所以犯帝之忌而取捕逮之辱者亦以此哉然勃亦有以自取之也逺權退勢出於卩則善出於君上之迫促則已非矣陳丞相卒上復用勃為相亦以資歷功勞無以易勃故爾要亦有不得已焉者也十餘月而遣歸則本心見矣夫為丞相不自抽身而待其君之遣則已可哂矣為勃之計惟有深藏逺蹈而被甲以見守尉果何為者邪借使漢家欲戮一退休之相甲胡足以禦之然則勃非能反者特不學而愚爾使文帝諒其愚則自可以保其不反逮治之事何待薄太后提絮詰責而後止哉故嘗謂文帝平生寬厚惟誅薄昭逮周勃二事最忍然就二者較之薄昭罪已著則誅之猶有説周勃反未眀則治之無名世謂文帝能保全周勃而宣帝不能保全霍光以是為優劣不知諸霍之炎真有危漢之理以勃之重厚無能而又已謝事就國氣象衰落自危不暇而何暇危漢使帝無捕治一事是真保全勃矣既捕治之則何保全之有哉惜也以帝之寬厚而猶少恩若是也樊噲論漢初勇士無如噲噲之勇無大於持盾入楚營及排闥入禁中之事戰伐不足道也然持盾事足以脫帝之難而重帝之信排闥事雖足以解帝之惑而亦足以招帝之疑譬如家有悍僕以之禦侮他人則可若主有過直入其帷而諫之縱曰朴忠其主亦已畏之矣髙帝笑而起其中以為如何哉此固疾時之譛所由入也然則帝之欲殺噲其豪壯強直自可忌爾盧綰論人主之報舊恩當厚以賜豫不當假以封爵綰之與帝不過曰生同日居同里及壯而學書相愛爾初非有運籌帷幄之助攻城野戰之勇也以信越之徒勳績如許僅得一王封而猶關鑰隄防若冦盜綰獨何為而王綰王則凡帝布衣之交其可王者多矣白馬之盟曰非劉氏不王非有功不侯夫不可以無功而侯况可以無功王乎髙祖善於律後人而不善於律其身異時四吕之王安知其不以是藉口也周亞夫申屠嘉論讀周亞夫傳見文帝所以重將之權讀申屠嘉傳見文帝所以重相之權將相之尊次天子將相不重則天子亦輕此投鼠忌器之説也夫以堂堂天子之尊一入軍門而使之按轡徐行無異臣僕寵一私昵誰敢與君抗而摧拉困挫瀕於死而後釋之人皆以為二子之難蓋不知文帝之所以為難爾有文帝則足以容二子無文帝則二子雖欲為二子而不能夫文帝非不能自尊而卑將相也顧其所以尊將相者乃所以尊已也易曰謙尊而光卑而不可踰夫惟其謙故有尊而光之理惟其卑故有不可踰之理世謂文帝之治尚寬不知其振舉朝綱尊強國體精采凛然銷姦褫惡蓋有合於乾德之剛而非懈怠縱弛以為寬者也景帝見識不眀故疑心一開大臣不得展手伸足文帝任亞夫則景帝殺亞夫文帝任嘉則景帝亦殺嘉二子在文帝時如在天池在景帝時如在樊罟非二子前後相反時使然也景帝之待二子誠失矣而二子亦有以致之大凡氣強無學慮直少謀未必不為身患宰相職業以格心為主不以矯激亢訐為功以景帝之忌刻二子無以化導融液之而與力爭於事為之末則亦宜其扞格而不終也况夫取箸之傲未免以私情而虧公禮悔不先斬錯之説又未免以小忿而忘大敬嗚呼已伸者難屈已亢者難下景帝之不能容亦文帝之能容有以致之耳蓋惟二子得容於文帝而遂以其事文帝者事景帝其氣益張不可收斂則其死宜矣觀此不獨見文景二君體貌大臣之輕重而亞夫嘉之相業可以夷考矣劉向論劉向學術未醇而心事甚正其學見於事宣帝其心見於事元成夫神仙黃金乃秦皇漢武之所以亂亡者向以通逹能文應名儒俊材之選召見之初疑有正論禆益而所獻者淮南鴻寶祕書及鄒衍重道延命方而已名儒俊才果如是乎推是以往則所謂講論五經者亦粳粃土苴爾雖然不遇疾風無以知徑草不遇恭顯王鳯無以知劉向漢家宗室固多其朴實為漢者特一向爾惜乎其無沉幾深略也何者去小人之法不在淺躁方望之堪向等同心輔政其力強其年富可以有為矣是時恭顯所以疑數子者亦未甚也使有沉幾深略以圖之未必無成奈何未白語泄先受下獄免官之禍其啓恭顯之疑一也後上感悟賜望之爵關內侯而徴堪向欲以為諫大夫事體方有可回之漸正宜緩以待之奈何使外親上變事復以此敗其啓恭顯之疑二也二疑之餘更相仇敵向等之忿恭顯日力而恭顯之防向等日深觀向之所以攻恭顯者専以災異而恭顯之所以攻堪猛者亦以災異地動殆為恭顯此向攻恭顯之言也以夏寒日青無光為堪猛用事之咎此恭攻堪猛之言也正人指邪人為邪邪人指正人為邪正不勝邪則向等不能害恭顯而反為恭顯所害望之死於獄則失一援矣堪死於瘖則失二援矣蓋望之堪尚存向猶得扳連以成事望之堪既死則向雖獨抱忠腸倀倀然何所依哉探本窮源則實向等始焉之輕發有以召之也或曰向之攻王鳯非有所謂語泄之過與外親上變事之非也胡為向之計終不行而鳯之姦終不去曰不然恭顯雖擅權未至如王氏之盛而向之攻王氏又無望之堪猛之助也恭顯之姦本亦可去向不能審其所以去王鳯之姦既難於去向亦終不可得而去此理之必然者也大抵去姦之事出於上則易出於下則難以元成之蔽於恭顯王鳯如彼其極向等欲以口伐代斧鉞難哉鳯之用事既甚於恭顯而成帝之孱弱復甚於元帝熟復向傳觀元帝因地震感悟下詔賜望之爵關內侯徴堪向欲以為諫大夫是猶能侯望之而徴堪向也望之自殺天子甚悼恨之乃擢堪為光祿勳堪弟子猛光祿大夫給事中大見信任是猶能擢堪猛而大信任之也因楊興諸葛豐之言左遷堪猛暨廟災日蝕乃召諸前言日變在堪猛者責問是猶能察諸臣之非而責問之也責問之後徴堪詣行在所拜光祿大夫秩中二千石領尚書事猛復為大中大夫給事中是猶能冉徴而以為光祿大夫大中大夫也特帝知之之心不勝於恭顯讒之之口遂以不終至於成帝則異是矣向奏洪範五行傳論則曰天子心知向忠精故為鳯兄弟起此論也然終不能奪王氏權其上諫延陵疏則曰上甚感向言而不能從其計其奏新序説苑及上疏陳法戒則曰上雖不盡用然內嘉其言常嗟嘆之至於上封事極言王氏則曰君且休矣吾將思之夫曰休者其真情曰思者其矯辭也縱帝能思與不思一爾嗚呼唐德宗不以盧杞為姦邪而以薑公輔為賣直德宗之愚惑未足責也成帝知恭顯之為専擅而惡之矣知向等之為精忠而喜之矣乃齷齪牽制略不得一引手何哉譬如家有幼主而強奴悍婢操竊其權主固知其受制有至親良友告以驅除之説亦已覺其言之善而乃因循茍且不能早為之計其不終敝於強奴悍婢之手者幾希劉歆論歆向之異同有二有談經之異同有用心之異同夫専門名家正是漢儒之癖歆向雖父子其不肯相襲亦眀矣一以榖梁一以左氏其解春秋之辭雖異其欲眀春秋之意亦豈得異哉奈何向以春秋排王氏歆乃以春秋附王氏向所上封事指陳春秋災異及於弒君亡國之語是知篡逆之為大罪矣而歆獨輔莽以篡逆豈左氏教之耶大凡亂臣賊子之作於世非重有所倚毗則事不成故必有茍賤無恥之士羽而翼之教之以黼藻太平興建禮樂塗天下之耳目而簧鼓其視聽乃克有濟蓋所謂孔光張禹之徒皆是也終之者劉歆焉其罪可勝誅哉故嘗謂焚六藝者不在秦始皇而在漢末之數子秦始皇焚之而不亡漢末數子用之而亡吳王濞論養惡如養癰疽養之而不治則將至于不可治逮其不可治而欲以刃去之未有不潰裂為身害者吳王濞之惡自髙帝而已萌至文帝而已成至景帝而已固當是時謀所以去之當有深沉審重之術豈容遽以刃為哉鼂錯號曰智囊其愚極矣夫髙帝善知人其臨終告呂后區處參陵平勃輩如神醫料疾半語不爽濞有反相宜不勞於目擊矣以之告濞而又戒以毋反者蓋將逞已之眀特而驚摧濞志也然是語一出濞知帝之疑已矣知帝疑已濞亦安得而不自疑乎觀帝告以天下同姓一家而吳太子之死濞即曰天下一家死長安即葬長安則拊背之言濞已橫在胸中一旦有郤則激為此論爾文帝之時固當陽厚其禮而隂為之所乃自賜几賜杖之外寂無聞焉夫几杖之賜謂文帝善優容則可謂文帝善措置則不可何者是時濞已有邪謀帝不審圖之而徒曰尚恩縱能釋其謀於一時烏能釋其謀於異日蓋恩濞者適所以誤濞而誤濞者適所以自誤也至景帝時欲一舉而去之則不可矣夫非七國之強不可去也所以去之者非其道也夫憂七國之變豈特鼂錯哉在文帝時賈誼固已憂之矣其曰欲天下之治安莫若衆建諸侯而少其力患諸侯之強且大也故欲割地定制分齊楚趙燕梁為若干國而廣封諸王之子孫其地衆而子孫少者則空其國以待其子弟之生天子無所利焉至於欲舉淮南地以益淮陽而使之禁吳楚割淮陽二三列城與東郡以益梁而使之扞齊趙計慮周微往往切中不若錯之直且疏也其後帝思誼言復分齊為六分淮南為三以至七國反時吳楚趙與四齊王舉兵西鄉而梁王扞之卒破七國誼之智有以使之也使錯能深思熟慮如賈誼之䇿則七國之反亦豈若是亟哉雖然錯之罪不在於削吳而在於削膠西楚趙夫膠西楚趙初未有反謀之可言也未有反謀而削之錯之意固欲因膠西楚趙以令吳而明削地之出於公爾不知膠西楚趙之削既有以離膠西楚趙之心而濞又得挾之以號召諸國諸國之從濞宜也蓋濞不連諸國濞亦不能以自反濞之欲反久矣顧無援且無名耳今既得膠西楚趙之削以為名則可以激怒諸國諸國既皆畏削則亦不得不皆為濞之援名著援強遂為漢憂幸城守有梁而主兵有周亞夫不然殆矣錯一死胡足道哉
