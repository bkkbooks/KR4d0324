body:
  text: 篔窗集卷三宋陳耆卿撰序論孟紀䝉序天下不知凡幾書也而能盡天下之書者則莫若論孟論孟非能盡天下之書也能盡天下之書之理也夫誦說有限而理無窮獨不見夫萬斛之泉乎汲者愈衆而來者愈不已也學者之從事於斯也茍不以身體之以日用推之而徒耳剽目掠唇商齒榷欲以明理理不明而反晦譬之逺道聞其逺者未必真知逺也至於足履之則知逺矣又譬之美味聞其美者未必真知美也至以口試之則知美矣學者讀聖賢之言而無體驗發明之益則身自身書自書縱千萬言祗益為贅其何以修已治人放之四海而凖也豫少讀論孟未知其所以讀逮長知所以讀而未得其趣憂患後屏居杜門乃始深玩而精索之其初也懵懵然其後也汩汩然又其後也洋洋然蓋所謂以身體之以日用推之之驗也大而天地山河細而一飲一食無不往復省察動靜思維故其熟也頗覺身與書非二物目之在書也書之味固不加多其不在書也書之味亦不加少坐焉書也立焉書也凡百語默作止無非書也嗚呼豫之從事於斯也久矣其得於心者本不可以言語傳也而或不免於言亦姑以志吾見之所至而已乃録而藏於巾篋命曰紀䝉俟豫見或日進䝉或日開將删續而是正之非敢以是為至當不可易之說也或曰論孟之說自魏晉以來枝分蔓錯亦浩汗已迄于我朝諸老先生然後論定由今視之至矣盡矣子之譊譊果有以甚異乎諸老先生之說耶曰豫非有甚異乎諸老先生之說也然取足於諸老先生之說而中無得焉豫亦不為也訂於諸老先生之說以㑹其歸反於吾之心以求其實如斯而已矣程子曰解經不同處無害只大體貴相似耳此諸老先生所以教也敬以是謝子之問嘉定辛未仲冬望日天台陳耆卿序論孟紀䝉後序豫既作論孟紀䝉序尚懼學者求之泛濫而未識夫大旨也又從而推明之大旨謂何仁義是也易曰立人之道曰仁與義使仁義常明則孔孟之言不必行矣孔子罕言仁而孟子兼言義夫豈茍以為異亦各有攸當耳仁者天地生物之心也天地以仁為生物之心而人亦得之以為心所謂五常之本大而無所不包者也惟其大而無所不包也故人罕能之而孔子亦罕言之觀當時學者之問咸有輕夫仁之心矣而孔子未嘗輕豫也問仲弓則曰不知其仁問由求赤則曰不知其仁問子文文子則曰未知焉得仁極而至于顔子之好學亦止曰三月不違仁而已嗚呼使當時學者知聖人不輕豫之意孜孜焉矻矻焉去人欲而還天理則仁之道可以厯階升堂而馴入於閫奧是罕言者所以深言之也雖然孔子未言仁之為何物也自孟子以仁為人心而仁之道明夫明仁之道者孟子也泄仁之藴者亦孟子也且何獨言仁併與義而言之矣孔子不言義以仁而包義也孟子兼言義以義而證仁也孟子既言夫孔子之所罕言而又言夫孔子之所不言豈其得已哉蓋以時人不知義故也告子孟子之高弟而猶以義為外非惟不知義且不知仁故孟子兼言之七篇之中多正義之說也義之說明仁之說亦明矣嗚呼學者其可不求論孟之大旨乎知仁之一言則足以悟論語之書知義之一言則足以悟孟子之書又知仁可以該義而義可以證仁則可以兼悟論孟之書若夫舉一而廢一通於此而不通於彼奚其悟學者詳之臘月朔日後序送商羲仲倅延平序仕之門有品級初掇第得簿若尉已乃調丞若郡曺嵗㑹六受五大官薦乃克改秩秩改注邑法也邑滿得二郡亦法也俗重內往往以受邑為不得已既又以二郡為恥賢而獲於上者不問反是則亦縻日引月聲哀當路求所謂院若轄者噫院若轄非尊也二郡非卑也栖栖然以一出入為喜戚奚其隘惜乎無以商君之事告者初君之官定海也有聲賢而獲於上矣咸謂合在朝廷伸眉吐氣君若不以為意其所調則劒浦之治中也自當時之惑者不以為疏則以為激不知君之心如行雲流水遇物而不必於遇吾知行吾志而已內與外且無有焉有所謂喜戚者哉君無喜戚而於劒浦之喜戚則大人謂千里權在守守行二助之則往往以不急視二是大不然夫使千里之民得安於民者守也使守不得恣於守者二也二不治則守恣守恣則民病何謂不急雖然彼有頡頏作氣相敵不相下者誠不恣其守矣然不恣守而自恣則所以病民益甚二者不同則皆君之罪人也吾聞廉於立位者必能舉其職君之行吾知劒浦之民辟易改視而千里之內薰如也乃探其意而為歌曰劒浦之水兮深幽君之愛兮與水爭流劒浦之山兮嶪岌君之節兮與山角立於君為屈於我為伸尚其歌之以詔後之人送應太丞赴闕序貴溪應先生以淳熙丁未唱第嘉定辛未登朝繇棘丞丐外厯郡守常平使者升轉漕辭不拜改刺處州有問處州之政者皆曰先生有恢恢之才而宅以謙有稜稜之威而陶以和有了了之智而載以默凝香宴坐未嘗疾聲躁色也而千里之人皆親愛而師畏之古所謂儒者政真其人歟和氣川融歲以稔告逺近稚耋免縱理入口之相非飽於稼飽先生之仁義也方將用借寇故事請于廟朝然滿且召矣或謂先生三十二年之科名八年之班綴久于外以部使者屈治郡今再入已回翔矣而未知造物意也浮花艷卉無旬日長而巨柏之亭亭參天不改非雪霜畔常有陽春邪久於外者惠吾民也以部使者屈治郡者辭尊居卑之義也踰滿而後召者不輕奪赤子之乳也召之贊奉常者有興禮樂致太平之具而以為之兆也耆卿下邑勾稽吏爾朴拙根性先生覆翼之吹送之煦我以道德鞭我以文辭恩獨厚念雖束縛千兔未白此悃矧一幅剡藤哉觀唐人送李正字皆以詩以序者獨韓退之序意厚也然觀退之諸序有祝體有規體今將為規乎尚何規盍亦不以規而以祝乎秋浸疏梧月酣新桂祖帳溢衢餞觴浮空一祝曰寒燠未齊宜戶牖泰和壽斯文脈再祝曰上方禮羅鴻碩九鼎宗社詔爾父老先生去是邦非忘之也起而漸澤八荒則一州固在其中矣三祝曰牛馬走尚伏泥塗望先生今在何許異時邂逅毋相忘一祝為先生也再祝為父老也三祝自為也酒三行而祝辭備古體也嘉定戊寅八月望門人天台陳耆卿序送羅明仲序豫曩歲業於鄉校里中子多從之遊課其尤得羅生羅生文而好修氣醇且恬逈矣其不類里中子也愛之甚生亦樂於親余兩載來豫多病他稍辭去生獨往來如故豫以為久要之誼在生無惑一日來諗曰表叔父商公倅劒浦將挾與俱某有親在不樂於逺而又念夫此行之弗得辭也先生意何如應之曰豫生平好逰每欲效司馬子長之周覽天下挹竒撮爽以礱吾胸家無伯仲尼焉而未獲遂也劒浦千里道爾生曷為不去且吾聞之人之所惡於逺遊者為其蕩也其蕩以其泛焉而失所依也依商公則得其所依矣是必能飲生以和陶生以靈而使之磊磊也生曷為不去雖然生去宜也豫亦有望於生焉凡學之道患在於小有得而自功自功之患非徒不足以語大也亦非所以固夫小也今以生為未有得是為誣生以生為大有得恐生之走而避也然則自功之患生雖未必有是余不得不慮及是繼自今立志不實不收不逺不休庶幾乎學增而趣新以是而目劔浦之山川風物其所得必大生勉哉豫與生别跡雖南北而心則同堂若也謹勿忘豫之言送王抑之序四明王君抑之少以能賦貢禮部白髮始入官再轉而丞吾邑其筆端橫放泉逬矢激牒訴未燭首尾已娓娓數百言人甚壯之意其功名未艾也踰年政成忽有所不樂賡陶潛詩請於郡解印綬去去之日士大夫左右顧欲苛留之卒噤無術而止然君之去甚非得已也君自念身儒生不能敲擊振撼朘膏血以媒寵姑欲用平平策書下下考庶不愧父老云爾㑹歲大祲力役之征沒于吏蠧者久已不治而蠲閣之令且下旦暮弄朱墨雖手痍足冰無以塞責君謂技止此爾欲强徴之民則不忍欲傲視上官之期㑹則不敢不惟不敢將有罪以故遂行嗟乎世見以特科入仕者往往競狎易之謂其茍祿活妻子爾君身可老志不可屈且禍未及褰裳而逃之彼悠悠風塵無君之年而朵頥不休者當為之愧死矣古人云可以止則止君非可以止者邪又云有官守者不得其職則去君非不得其職者邪抑余聞君固老矣而且有母在縱不為妻子地奈何乎庭闈曰仕以行道卷道而安於家雖啜菽飲水樂也枉道而不安於官雖日用三牲不樂也即其子之所以養知其母之所以教尚庶幾乎魚軒載塗試為余讀此序余亦噤無術以留君者也送葉孟我之官寧國序嘉定改元夏五月鄉先生葉公孟我出為宣之寧國主簿是行也邦之大夫樂而賀之走獨以為歎宣言曰邦人知公耶公問學如禹治水考制度如周公畫井田制賦落筆為文章如庖丁奏刀而匠石操斧少已負聲望入太學名流異待之當是時謂萬里可立致命不隨時汩汩以老諸凡友公研席者或已為公相師公方册者多已為卿大夫公獨栖遲故山僅僅妻子養寒月半簾清風一榻蕭然弔影居人之所不堪是坐何尤哉寧國小邑也主簿卑官也吾方以為公弔奚其賀雖然吾為公平心而言之公亦為我平心而聽之天靳才哲人樂富貴二者之難兼自古固然蓋亦造物之神機所以瞑眩一世者必不得已而去曰寧去富貴富貴無聞者多矣而至於哲人雖餓且死名猶日月也然則將奈何邑小則便間官卑則逺謗琴高之山謝眺之亭前跡往事豈無怪怪竒竒為公獻者邪勾稽暇覽而歌之其聲與天籟相宫商而不雜則其視一主簿秩已為浼已無論其大詩云一日不見如三月兮况三歲别乎此則豫之所以悲代送學子之婺女序宋有天下德厚而澤遐施于金枝繁暢滋殖非徒富貴之且稔於教以故誦詩讀書與韋布之士敵盛莫盛於台黃巖其别有二曰江北曰西橋其父兄類以道德性命之學名家子弟油油翼翼奉家學惟謹誦讀之勞又有非韋布所及者余非獨慶諸趙之昌又以見聖朝之化訓本支者長也獨自恨寡陋生乎其里而不接其人私竊以為愧戊辰春杜門家食忽有以書幣來者乃江北趙招余以館也余欣然從之入其孰乃得親承其父兄而熟交其子弟所見過所聞通之於子弟行為最長穎悟絶人余所愛重也與之處相得歡甚不數月侍其父官婺女且來告别余因語之曰人之學不惟其地惟其志今夫為人子弟而不遇賢父兄可嘆也子父兄賢矣遇賢父兄而已無美質可至於學可嘆也子之質美而可至於學矣夫有賢父兄又有美質可至于學能充其志焉則何向不成婺女多師友往而參之必有以啓發子用是率仲及季鞭策於久大則為不虛其美質者也不愧其賢父兄者也不負余之所愛重者也修塗犯暑願加護送伯父歸餘杭序歲在己酉伯父有臨安之役耆卿年甫十二未知别味何若也三十年間耆卿以試如臨安得見者三焉伯父亦以事歸台得見者四焉初見時伯父年未老齒髮方盛而神完氣澤不以羇旅形於色其後年向老矣而齒髮不衰又其後齒髮少衰而獨其神氣炯炯自若也以故一見則一喜喜定復悲念吾先君已不生此其同産兄弟也行年七十有四矣不得與之同堂合席而使飄泊於異鄉吾何顔以上松楸邪然伯父去台之久也客于彼之安也謂吾手經足緯習貫如鄉里也吾身館焉吾子贅焉吾孫育焉吾魂夢實依焉是故每一來歸往往不數旬而返有留止者伯父拒弗聽也嗚呼其别日多而㑹日少如此人生非金石可不重為浩嘆哉今耆卿試吏青田距臨安千里而遙伯父繭足至曰吾來良苦吾內之死十二年矣吾營營衣食而已葬未有銘而且無其資吾將奔告于世之有力而好義者汝其籌之耆卿曰噫此小子責也敢以纍伯父因念伯父平生竒邁其稍滿足時棄千金猶敝屣遇窮且困一介不屑也臨安天子行都貴人林立伯父未嘗託足而曰使吾曵長裾而生不若服短褐而死其介如此今乃迫於其內之葬而役役逺遊非有大不得已者而奪其情邪耆卿既為之銘而力薄不足以助書而聲之當路又念磊砢之士何世無之伯父此行當必有如范郭故事者追送之餘恨身囚朱墨不得隨鷁首以邁儻僥幸滿秩尚思迎奉華顛歸老帢幘峯之下也嘉定丁丑重五前一日姪耆卿序贈畫墨竹葉漢卿序此君自王子猷即可膾炙百世長子孫於巖穴者月纍歲積人既飫其真則又欲圖其假以自近漢卿其傑也漢卿衣鶉衣杯酒外懶不收束疑與竹反而旦旦摹畫之抑其中偶有合邪俾之試所習初不經意已乃竒態橫發瞥眼百尺風披雨灑如在瀟湘其可以傳無疑也余嘗論世間繪事宜得天然竒趣若葉葉而較節節而數殆類刻楮愈肖愈非知是說者可以慨然矣世見蕭協律文與可殘根墜籜則起恨不同時之歎至吾漢卿醉墨淋漓縱橫滿屋或不知寶愛之可怪也哉贈劉神童序童子科所以羅天才之早慧者謂宜朝雋異而夕富貴也劉君得此二十有三年猶在短褐雖舌本九經聲出金石不足以易一飽况富貴邪吁此命也然人視劉君可以謂之命劉君自視則不可謂之命歸故里訪舊編浚之使益深鞭之使益逺毋使人誇其早慧而不見其晚成此之謂自立君勉哉若以為歸之具未治當必有動心者送徐山序徐君山來自永嘉示豫諸公詩詩言其談五星甚美問之則豫黃巖人也不遇之同里而遇之異鄉豫亦陋矣君徴豫詩㑹豫冗謾筆此紙未知重㑹在何處貴者之難逢未若賢者之不易值也觸熱萬里眼光挾電或有賢而貴者其告我也哉送朱生序曩歲評吾鄉術士其精者曰朱君朱君起書生往來皆里社之俊故其名奕奕在人上不以其貌廢也嘗過余道禍福極欵洽余喜為賦詩自是十年不相聞去歲竊末科他術士紛來賀又弗覿君面意其頡頏不屈否則諱其功而厚自匿也然聞其貧甚自放於相如滌器之側心甚憐之抑豈徒能言人之命而獨遺其身邪春雨相過理舊話若一夢其憔悴朴訥猶故且曰有子矣視君之子之命果有立則君之命未為不過也因書此語俾刻諸家孰重贈陳良夫序余曩為陳君作序序百餘言言其術之驗於余者爾其驗於人者未之悉也試吏青田君扁舟往還尤熟叩其術精於前者更十倍水心先生復次對盧子高葉季重預薦陳漫翁得近祿應魏二太守拜罷何元樞薨杜晦之死余弟良卿喪耦皆明指日月不差他若此甚衆書其顯顯以告知者嗚呼術士東西南北取人厭多矣余於君不惟不厭且日益敬愛之離則愁合則喜以余之寡合與君之不茍合而其合如許此未易與俗人言也庚辰二月上浣再書於篔窗贈周生序周生自言有母耋甚倚其術以活其營營四方菽水外無他願也術士滿天下罕有知此論者昔嚴君平卜筮成都與人子言依於孝周生豈徒言而已其允蹈之者歟陳耆卿贈三衢葉生序日者以金木水火土牽率附㑹訂人之吉凶死生其中者十無二三世率惑之告以富且貴則喜貧且賤則悲由是日者揣顔色進軟熟語姑以攫利而止世雖知其難信復不能不信問者常駢肩也夫富貴貧賤固有命然君子罕言焉今夫仁義禮智得非天所以命人者邪修其身仁義禮智無歉焉貧且賤不恥也不修其身仁義禮智缺焉富且貴濫也人不逺恥而師濫以故聞命之不善則變乎色其身之不善則安焉吾固知其惑也今天下恥不富貴者何限葉君茍徒以富貴悅之是誑也繼自今稍放於仁義禮智則幾矣君其行隘軒先生文集序於時隘軒年八十一而五經始論後三年五月孫若水始袖畀豫又二月始完領他述蓋豫郡補官需之明年也初若水來豫問尊翁壽幾何飲食起居若何娛老以何若水謂年及耄匙飯不滿掬觀書每薄夜半倦劇引榻天未雞朗吟五經論一過曙即起外是無旁娛嗣豫得論讀之綿深婉淡文有漢風內宿聖賢氣象易詩書尤逈透佚前輩非真見到者不到也若水又謂論既成他述隨以板板二年印帙甫三一自畀一大田今一先生我祖于此訒矣豫觀經論數千言十不集中一隘軒自叙獨此介介他述冷莫掛語疑不彼重或不精及層掀統玩意弗痕句無鏤古腴天况大略如江潭未波而淵然之神固在知非不重不精而精重有大彼者聖人書敬齊緒也既大之冝不老不著不人不畀訒著則訒畀矣論如許他述可徵也隘軒車氏名似慶表石卿敬齊其先人大田其友人王德父之里端平丙申三月朔篔窗陳耆卿序赤城志序圖牒之傳尚矣今地踰萬里縣不登萬户亦必有成書焉矧以台為名邦且稱輔郡綿涉千歲更數百守而闕亡以紹難之歟抑因陋襲簡不暇問歟有守四人嘗厪其力于斯矣如尤公袤唐公仲友李公兼類鞅掌不克就最後黃公㽦以命余偕陳維等纂集焉㑹黃去匆匆僅就未備也束其藳十年矣更久則非惟不備而併與僅就者失之今青社齊公碩始至欲迄就未暇踰年報政遂復以命余于是郡博士姜君容總𣙜之邑大夫蔡君範以下分訂之又再屬陳維及林表民等採益之既具余為諗沿革詰異同劑巨纎權雅俗凡意所未解者恃故老故老所不能言者恃碑刻碑刻所不能判者恃載籍載籍之內有漫漶不白者則斷之以理而折之于人情事立之凡卷授之引微以存教化識典章非直為紀事設也如是者半載而書成嗟夫同是州也非可成于今也或曰有時爾昔歐陽公論學慨述吏道以為有司簿書之所不責謂之不急夫豈惟學哉語以圖牒非不急之尤者邪然而莫奧于圖牒莫泄于簿書有司之所不急固君子所急也今公之為政也剖叢滌煩燭幽洞隱于有司所急者誠井井矣而于君子所急者尤惓惓焉用能以半載之間紉千歲之闕增十年之未備洗數百守之因襲成四人之厪嗟夫此豈以其時哉書成者時也所以成者公之志也其志立則時赴之矣無其志而曰需其時者吾未之聞也豈惟一圖牒為然天下事皆然
